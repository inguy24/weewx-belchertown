<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>C2 — Wind Card v2</title>
<style>
/* ── Self-hosted fonts ──────────────────────────────────────────────── */
@font-face { font-family: 'Manrope'; font-weight: 400; font-style: normal;
  src: url('fonts/manrope-latin-400-normal.woff2') format('woff2'); }
@font-face { font-family: 'Manrope'; font-weight: 600; font-style: normal;
  src: url('fonts/manrope-latin-600-normal.woff2') format('woff2'); }
@font-face { font-family: 'Manrope'; font-weight: 700; font-style: normal;
  src: url('fonts/manrope-latin-700-normal.woff2') format('woff2'); }
@font-face { font-family: 'Outfit'; font-weight: 400; font-style: normal;
  src: url('fonts/outfit-latin-400-normal.woff2') format('woff2'); }
@font-face { font-family: 'Outfit'; font-weight: 600; font-style: normal;
  src: url('fonts/outfit-latin-600-normal.woff2') format('woff2'); }
@font-face { font-family: 'Outfit'; font-weight: 700; font-style: normal;
  src: url('fonts/outfit-latin-700-normal.woff2') format('woff2'); }

/* ── Design tokens ──────────────────────────────────────────────────── */
:root {
  /* A4 grid tokens */
  --gap-grid:      1rem;
  --container-max: 80rem;
  --card-row:      11rem;
  --card-radius:   0.875rem;
  --card-pad:      1rem;

  /* Type families */
  --font-sans:    'Manrope', system-ui, sans-serif;
  --font-display: 'Outfit',  system-ui, sans-serif;

  /* Type weights */
  --font-normal:   400;
  --font-semibold: 600;
  --font-bold:     700;

  /* Type scale — locked */
  --text-stat-card:  3rem;
  --text-section:    0.95rem;
  --text-secondary:  0.85rem;
  --text-card-title: 0.82rem;
  --text-label:      0.75rem;

  /* C1 glass tokens (light theme) */
  --glass-bg:     rgba(255,255,255,0.92);
  --glass-border: rgba(0,0,0,0.10);
  --glass-shadow: 0 4px 24px rgba(0,0,0,0.12), 0 1px 4px rgba(0,0,0,0.08);

  /* Foreground */
  --fg:         #18181b;
  --fg-muted:   #5b5b63;
  --title-rule: rgba(0,0,0,0.12);

  /* Accent */
  --accent:     #2563eb;

  /* C1 photographic sky scene — verbatim */
  --scene: linear-gradient(160deg, #7fb6d6 0%, #a9d0e8 35%, #cfe5f3 70%, #eaf3fa 100%);
}

/* ── Reset ──────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-sans);
  background: var(--scene);
  color: var(--fg);
  min-height: 100vh;
  display: flex;
  align-items: flex-start;
  justify-content: flex-start;
  padding: 2rem;
  font-variant-numeric: tabular-nums;
}

/*
  Wind card sits in a 4-col A4 grid as col-span-2 × row-span-2.
  At 80rem (1280px) container, 4 cols, 1rem gap:
    col = (1280 - 48) / 4 = 308px
    card width  = 2×308 + 16 = 632px
    card height = 2×176 + 16 = 368px    (11rem = 176px at 16px base)
  We declare those dimensions directly. The grid context is preserved by
  the outer .grid-context wrapper which replicates the A4 grid.
*/

/* Outer grid replicating A4 layout */
.grid-context {
  width: 100%;
  max-width: 80rem;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  grid-template-rows: repeat(2, 11rem);
  gap: 1rem;
}

/* ── Glass card ─────────────────────────────────────────────────────── */
.card {
  background: var(--glass-bg);
  border: 1px solid var(--glass-border);
  border-radius: var(--card-radius);
  box-shadow: var(--glass-shadow);
  backdrop-filter: blur(8px) saturate(1.1);
  -webkit-backdrop-filter: blur(8px) saturate(1.1);
  padding: var(--card-pad);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.wind-card {
  grid-column: 1 / span 2;
  grid-row: 1 / span 2;
}

/* ── Card header ─────────────────────────────────────────────────────── */
.card-title {
  font-family: var(--font-sans);
  font-size: 0.82rem;
  font-weight: 600;
  color: var(--fg);
  display: flex;
  align-items: center;
  gap: 0.35rem;
  padding-bottom: 0.4rem;
  border-bottom: 1px solid var(--title-rule);
  flex-shrink: 0;
  line-height: 1.2;
}

.card-title .icon {
  width: 1rem;
  height: 1rem;
  opacity: 0.72;
  flex-shrink: 0;
}

/* ── Dial wrapper ────────────────────────────────────────────────────── */
.dial-wrapper {
  flex: 1 1 auto;
  display: flex;
  align-items: center;
  justify-content: center;
  padding-top: 0.5rem;
  min-height: 0;
}

/* ── SR-only ────────────────────────────────────────────────────────── */
.sr-only {
  position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
  overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0;
}

/* ── Font stamp ─────────────────────────────────────────────────────── */
#font-stamp {
  position: fixed;
  bottom: 0.5rem; right: 0.75rem;
  font-size: 0.72rem;
  font-family: ui-monospace, monospace;
  color: #333;
  background: rgba(255,255,255,0.92);
  border: 1px solid rgba(0,0,0,0.15);
  border-radius: 0.375rem;
  padding: 0.25rem 0.6rem;
  line-height: 1.7;
  z-index: 100;
}
</style>
</head>
<body>

<div class="grid-context">
  <article class="card wind-card" aria-labelledby="wind-h">

    <h2 id="wind-h" class="card-title">
      <svg class="icon" aria-hidden="true" focusable="false" viewBox="0 0 256 256">
        <path fill="currentColor" d="M184 96a40 40 0 0 1 0 80H32a8 8 0 0 1 0-16h152a24 24 0 0 0 0-48H32a8 8 0 0 1 0-16h152Zm8-56a32 32 0 0 1 0 64H32a8 8 0 0 1 0-16h160a16 16 0 0 0 0-32H32a8 8 0 0 1 0-16h160Z"/>
      </svg>
      Wind
    </h2>

    <p class="sr-only">Wind 12 mph from 305 degrees northwest. Gust 18 mph.</p>

    <div class="dial-wrapper" aria-hidden="true">
      <!--
        Fixed-size SVG dial.
        Card CSS height = 2×11rem + 1rem = 23rem = 368px.
        Card padding: 1rem top + bottom = 32px. Title + border: ~20px. Wrapper padding-top: 8px.
        Available for dial: 368 - 32 - 20 - 8 = 308px → use 290px for comfortable margin.

        ViewBox 290×290, center 145,145, outer ring r=132.
        Font scaling: SVG rendered at 290px; scale = 290/290 = 1.
          --text-stat-card 3rem = 48px → 48px SVG units
          --text-section 0.95rem = 15.2px → 15px SVG units
          --text-secondary 0.85rem = 13.6px → 14px SVG units
          unit ~1.4rem = 22.4px → 22px SVG units
      -->
      <svg id="wind-dial"
           viewBox="0 0 290 290"
           width="290"
           height="290"
           role="img"
           aria-label="Wind compass: 305 degrees NW, 12 mph, gust 18 mph">

        <!-- Dial disc -->
        <circle cx="145" cy="145" r="132"
          fill="rgba(244,247,252,0.90)"
          stroke="#22222d"
          stroke-width="4.5"/>

        <!-- Inner guide ring -->
        <circle cx="145" cy="145" r="119"
          fill="none"
          stroke="rgba(0,0,0,0.05)"
          stroke-width="1"/>

        <!-- Tick marks — JS -->
        <g id="ticks"></g>

        <!-- Cardinal labels -->
        <text x="145" y="15" text-anchor="middle" dominant-baseline="middle"
          font-family="'Manrope',system-ui,sans-serif"
          font-size="12" font-weight="700" fill="#22222d">N</text>
        <text x="275" y="145" text-anchor="middle" dominant-baseline="middle"
          font-family="'Manrope',system-ui,sans-serif"
          font-size="12" font-weight="700" fill="#22222d">E</text>
        <text x="145" y="275" text-anchor="middle" dominant-baseline="middle"
          font-family="'Manrope',system-ui,sans-serif"
          font-size="12" font-weight="700" fill="#22222d">S</text>
        <text x="15" y="145" text-anchor="middle" dominant-baseline="middle"
          font-family="'Manrope',system-ui,sans-serif"
          font-size="12" font-weight="700" fill="#22222d">W</text>

        <!-- Bearing marker — JS -->
        <g id="bearing-marker"></g>

        <!-- Direction: Manrope 400, 15px ≈ --text-section 0.95rem -->
        <text x="145" y="95"
          text-anchor="middle" dominant-baseline="middle"
          font-family="'Manrope',system-ui,sans-serif"
          font-size="15" font-weight="400"
          fill="#5b5b63">305° NW</text>

        <!-- Speed: Outfit 700, 48px = --text-stat-card 3rem -->
        <text x="145" y="150"
          text-anchor="middle" dominant-baseline="middle"
          font-family="'Outfit',system-ui,sans-serif"
          font-size="58" font-weight="700"
          fill="#18181b"
          letter-spacing="-1">12</text>

        <!-- Unit: Outfit 400, 20px ≈ 1.25rem -->
        <text x="145" y="186"
          text-anchor="middle" dominant-baseline="middle"
          font-family="'Outfit',system-ui,sans-serif"
          font-size="20" font-weight="400"
          fill="#5b5b63">mph</text>

        <!-- Gust row: wind icon + Manrope 400, 13px ≈ --text-secondary 0.85rem -->
        <g transform="translate(145,216)">
          <path d="M-65,0 Q-59,-3 -53,0 Q-47,3 -41,0 Q-35,-3 -29,0"
            stroke="#5b5b63" stroke-width="1.6" fill="none" stroke-linecap="round"/>
          <path d="M-65,5 Q-60,2 -55,5 Q-50,8 -45,5 Q-40,2 -35,5"
            stroke="#5b5b63" stroke-width="1.2" fill="none" stroke-linecap="round"/>
          <text x="-24" y="2"
            text-anchor="start" dominant-baseline="middle"
            font-family="'Manrope',system-ui,sans-serif"
            font-size="13" font-weight="400"
            fill="#5b5b63">Wind gust 18 mph</text>
        </g>

      </svg>
    </div>

  </article>
</div>

<div id="font-stamp">checking fonts…</div>

<script>
(function () {
  'use strict';
  var NS = 'http://www.w3.org/2000/svg';
  var cx = 145, cy = 145, outerR = 129;
  var gTicks = document.getElementById('ticks');

  /* Ticks every 5° */
  for (var deg = 0; deg < 360; deg += 5) {
    var rad = (deg - 90) * Math.PI / 180;
    var isCardinal = (deg % 90 === 0);
    var isOrdinal  = (deg % 45 === 0 && !isCardinal);
    var isTens     = (deg % 10 === 0 && deg % 45 !== 0);

    var len, w, col;
    if (isCardinal)     { len = 21; w = 3.2; col = '#22222d'; }
    else if (isOrdinal) { len = 14; w = 2.2; col = '#30303c'; }
    else if (isTens)    { len =  9; w = 1.5; col = '#50506a'; }
    else                { len =  5; w = 1.0; col = '#8888a0'; }

    var x1 = cx + outerR * Math.cos(rad), y1 = cy + outerR * Math.sin(rad);
    var x2 = cx + (outerR - len) * Math.cos(rad), y2 = cy + (outerR - len) * Math.sin(rad);

    var ln = document.createElementNS(NS, 'line');
    ln.setAttribute('x1', x1.toFixed(2)); ln.setAttribute('y1', y1.toFixed(2));
    ln.setAttribute('x2', x2.toFixed(2)); ln.setAttribute('y2', y2.toFixed(2));
    ln.setAttribute('stroke', col); ln.setAttribute('stroke-width', String(w));
    ln.setAttribute('stroke-linecap', 'round');
    gTicks.appendChild(ln);
  }

  /* Bearing marker at 305° */
  var bRad = (305 - 90) * Math.PI / 180;
  var gMark = document.getElementById('bearing-marker');

  /* Arc */
  var arcR = 127, arcH = 0.15;
  var aS = bRad - arcH, aE = bRad + arcH;
  var arc = document.createElementNS(NS, 'path');
  arc.setAttribute('d',
    'M '+(cx+arcR*Math.cos(aS)).toFixed(2)+' '+(cy+arcR*Math.sin(aS)).toFixed(2)+
    ' A '+arcR+' '+arcR+' 0 0 1 '+
    (cx+arcR*Math.cos(aE)).toFixed(2)+' '+(cy+arcR*Math.sin(aE)).toFixed(2));
  arc.setAttribute('stroke', '#2563eb'); arc.setAttribute('stroke-width', '8');
  arc.setAttribute('fill', 'none'); arc.setAttribute('stroke-linecap', 'round');
  gMark.appendChild(arc);

  /* Triangle */
  var tipR = 128, baseR = 103, halfA = 0.075;
  var tri = document.createElementNS(NS, 'polygon');
  tri.setAttribute('points',
    (cx+tipR*Math.cos(bRad)).toFixed(2)+','+(cy+tipR*Math.sin(bRad)).toFixed(2)+' '+
    (cx+baseR*Math.cos(bRad-halfA)).toFixed(2)+','+(cy+baseR*Math.sin(bRad-halfA)).toFixed(2)+' '+
    (cx+baseR*Math.cos(bRad+halfA)).toFixed(2)+','+(cy+baseR*Math.sin(bRad+halfA)).toFixed(2));
  tri.setAttribute('fill', '#2563eb');
  tri.setAttribute('stroke', 'rgba(255,255,255,0.9)'); tri.setAttribute('stroke-width', '2');
  tri.setAttribute('stroke-linejoin', 'round');
  gMark.appendChild(tri);

  /* Spoke */
  var spoke = document.createElementNS(NS, 'line');
  spoke.setAttribute('x1', (cx+40*Math.cos(bRad)).toFixed(2));
  spoke.setAttribute('y1', (cy+40*Math.sin(bRad)).toFixed(2));
  spoke.setAttribute('x2', (cx+97*Math.cos(bRad)).toFixed(2));
  spoke.setAttribute('y2', (cy+97*Math.sin(bRad)).toFixed(2));
  spoke.setAttribute('stroke', 'rgba(37,99,235,0.5)');
  spoke.setAttribute('stroke-width', '1.5');
  spoke.setAttribute('stroke-dasharray', '4 3');
  spoke.setAttribute('stroke-linecap', 'round');
  gMark.appendChild(spoke);

  /* Center dot */
  var dot = document.createElementNS(NS, 'circle');
  dot.setAttribute('cx', String(cx)); dot.setAttribute('cy', String(cy));
  dot.setAttribute('r', '5');
  dot.setAttribute('fill', '#2563eb'); dot.setAttribute('stroke', 'rgba(255,255,255,0.9)');
  dot.setAttribute('stroke-width', '2');
  gMark.appendChild(dot);
})();

/* Font stamp */
document.fonts.ready.then(function () {
  var mOk = false, oOk = false;
  document.fonts.forEach(function (f) {
    if (f.family === 'Manrope' && f.weight === '600' && f.status === 'loaded') mOk = true;
    if (f.family === 'Outfit'  && f.weight === '700' && f.status === 'loaded') oOk = true;
  });
  document.getElementById('font-stamp').textContent =
    'Manrope 600: ' + (mOk ? '✓' : '✗') + '  |  Outfit 700: ' + (oOk ? '✓' : '✗');
});
</script>

</body>
</html>
