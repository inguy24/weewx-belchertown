<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>C2 — Current Wind card</title>
  <style>
/* ── Locked fonts ─────────────────────────────────────────────────────────── */
@font-face { font-family:'Manrope'; font-weight:400; font-style:normal; src:url('fonts/manrope-latin-400-normal.woff2') format('woff2'); }
@font-face { font-family:'Manrope'; font-weight:600; font-style:normal; src:url('fonts/manrope-latin-600-normal.woff2') format('woff2'); }
@font-face { font-family:'Manrope'; font-weight:700; font-style:normal; src:url('fonts/manrope-latin-700-normal.woff2') format('woff2'); }
@font-face { font-family:'Outfit';  font-weight:400; font-style:normal; src:url('fonts/outfit-latin-400-normal.woff2')  format('woff2'); }
@font-face { font-family:'Outfit';  font-weight:600; font-style:normal; src:url('fonts/outfit-latin-600-normal.woff2')  format('woff2'); }

/* ── Tokens — light theme ─────────────────────────────────────────────────── */
:root {
  color-scheme: light dark;
  --font-sans: 'Manrope', system-ui, sans-serif;
  --font-display: 'Outfit', system-ui, sans-serif;
  --font-semibold: 600;
  --font-normal: 400;
  --text-card-title: 0.82rem;

  --gap-grid: 1rem;
  --container-max: 80rem;
  --card-half-row: 5.5rem;
  --card-radius: 0.875rem;
  --card-pad: 1rem;

  --glass-bg: rgba(255, 255, 255, 0.72);
  --glass-border: rgba(0, 0, 0, 0.10);
  --glass-shadow: 0 4px 24px rgba(0,0,0,0.12), 0 1px 4px rgba(0,0,0,0.08);
  --fg: #18181b;
  --fg-muted: #71717a;
  --fg-dim: #a1a1aa;
  --title-rule: rgba(0, 0, 0, 0.12);
  --page-bg: #f4f4f5;

  --tick: rgba(63,63,70,0.38);
  --accent: #2563eb;
}

/* ── Tokens — dark theme ──────────────────────────────────────────────────── */
@media (prefers-color-scheme: dark) {
  :root {
    --glass-bg: rgba(30,35,55,0.55);
    --glass-border: rgba(255,255,255,0.10);
    --glass-shadow: 0 4px 28px rgba(0,0,0,0.45), 0 1px 4px rgba(0,0,0,0.30);
    --fg: #e7e7ea;
    --fg-muted: #a1a1aa;
    --fg-dim: #71717a;
    --title-rule: rgba(255,255,255,0.12);
    --page-bg: #0d0f18;
    --tick: rgba(228,228,231,0.35);
    --accent: #60a5fa;
  }
}

/* ── Reset + body ─────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; }
body {
  margin: 0;
  padding: 3rem 1.5rem;
  background: var(--page-bg);
  color: var(--fg);
  font-family: var(--font-sans);
  line-height: 1.4;
}

/* ── Grid — half-row tracks ───────────────────────────────────────────────── */
.grid-4col {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: var(--gap-grid);
  grid-auto-rows: var(--card-half-row);
  max-width: var(--container-max);
  margin: 0 auto;
}
.col-span-2 { grid-column: span 2; }
.row-span-2 { grid-row: span 4; }

/* ── Glass card ───────────────────────────────────────────────────────────── */
.card {
  background: var(--glass-bg);
  border: 1px solid var(--glass-border);
  border-radius: var(--card-radius);
  padding: var(--card-pad);
  backdrop-filter: blur(8px) saturate(1.1);
  -webkit-backdrop-filter: blur(8px) saturate(1.1);
  box-shadow: var(--glass-shadow);
  display: flex;
  flex-direction: column;
  position: relative;
  overflow: hidden;
}

/* ── Card title ───────────────────────────────────────────────────────────── */
.card-title {
  font-family: var(--font-sans);
  font-size: var(--text-card-title);
  font-weight: var(--font-semibold);
  color: var(--fg);
  margin: 0 0 .5rem;
  padding-bottom: .4rem;
  border-bottom: 1px solid var(--title-rule);
  display: flex;
  align-items: center;
  gap: .4rem;
  flex-shrink: 0;
}
.card-title .title-icon {
  width: 1rem;
  height: 1rem;
  opacity: .75;
  flex-shrink: 0;
}

/* ── Dial layout ──────────────────────────────────────────────────────────── */
.dial-wrap {
  flex: 1;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 0;
}
.dial {
  width: 100%;
  max-width: 20rem;
  max-height: 20rem;
  aspect-ratio: 1 / 1;
  display: block;
}

/* ── Center overlay — data stack inside the dial ──────────────────────────── */
.center {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  gap: .15rem;
  pointer-events: none;
}
.bearing {
  font-family: var(--font-sans);
  font-size: .95rem;
  color: var(--fg-muted);
  letter-spacing: .04em;
}
.bearing .card-dir {
  color: var(--fg);
  font-weight: 600;
  margin-left: .2rem;
}
.speed {
  display: flex;
  align-items: baseline;
  justify-content: center;
  gap: .3rem;
  line-height: 1;
  margin: .1rem 0 .2rem;
}
.speed .num {
  font-family: var(--font-display);
  font-weight: 400;
  font-size: 3rem;
  color: var(--fg);
  letter-spacing: -.01em;
}
.speed .unit {
  font-family: var(--font-display);
  font-weight: 400;
  font-size: 1.05rem;
  color: var(--fg-muted);
}
.readouts {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: .4rem;
  margin-top: .3rem;
}
.readout-icon {
  width: 1.6rem;
  height: 1.6rem;
  flex-shrink: 0;
  opacity: .55;
  align-self: center;
}
.readout-lines {
  display: flex;
  flex-direction: column;
  gap: .1rem;
}
.readout-lines .row {
  font-family: var(--font-sans);
  font-size: .95rem;
  color: var(--fg-muted);
}
.readout-lines .row .val {
  color: var(--fg);
  font-weight: 600;
  margin-left: .25rem;
}

/* ── Screen-reader-only ───────────────────────────────────────────────────── */
.sr-only {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  margin: -1px;
  overflow: hidden;
  clip: rect(0, 0, 0, 0);
  white-space: nowrap;
  border: 0;
}
  </style>
</head>
<body>

<main>
<h1 class="sr-only">Current Wind — card mockup</h1>
<div class="grid-4col">
  <div class="card col-span-2 row-span-2">
    <div class="card-title">
      <svg class="title-icon" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M17.7 7.7A2.5 2.5 0 1 1 19 12H5"/>
        <path d="M9.6 4.6A2 2 0 1 1 11 8H5"/>
        <path d="M12.6 19.4A2 2 0 1 0 14 16H5"/>
      </svg>
      Current Wind
    </div>

    <div class="dial-wrap">
      <svg class="dial" viewBox="0 0 420 420" role="img">
        <title>Wind 12.0 mph from NW at 305 degrees. 10-minute average 9.0 mph, maximum gust 21.0 mph.</title>
        <g id="ticks"></g>
        <!-- Cardinal labels OUTSIDE the tick circle -->
        <text x="210" y="18"  text-anchor="middle" dominant-baseline="middle"
              font-family="'Manrope', sans-serif" font-size="14" font-weight="600"
              fill="#71717a" id="lbl-n">N</text>
        <text x="402" y="210" text-anchor="middle" dominant-baseline="middle"
              font-family="'Manrope', sans-serif" font-size="14" font-weight="600"
              fill="#71717a" id="lbl-e">E</text>
        <text x="210" y="402" text-anchor="middle" dominant-baseline="middle"
              font-family="'Manrope', sans-serif" font-size="14" font-weight="600"
              fill="#71717a" id="lbl-s">S</text>
        <text x="18"  y="210" text-anchor="middle" dominant-baseline="middle"
              font-family="'Manrope', sans-serif" font-size="14" font-weight="600"
              fill="#71717a" id="lbl-w">W</text>
      </svg>

      <div class="center" aria-live="polite">
        <div class="bearing">305°<span class="card-dir">NW</span></div>
        <div class="speed"><span class="num">12.0</span><span class="unit">mph</span></div>
        <div class="readouts">
          <svg class="readout-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M17.7 7.7A2.5 2.5 0 1 1 19 12H5"/>
            <path d="M9.6 4.6A2 2 0 1 1 11 8H5"/>
            <path d="M12.6 19.4A2 2 0 1 0 14 16H5"/>
          </svg>
          <div class="readout-lines">
            <div class="row">10-min avg<span class="val">9.0 mph</span></div>
            <div class="row">Max gust<span class="val">21.0 mph</span></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
</main>

<script>
(function () {
  var NS = 'http://www.w3.org/2000/svg';
  var g = document.getElementById('ticks');
  var css = getComputedStyle(document.documentElement);
  var cTick = css.getPropertyValue('--tick').trim() || 'rgba(63,63,70,0.38)';
  var cAcc  = css.getPropertyValue('--accent').trim() || '#b45309';
  var cLbl  = css.getPropertyValue('--fg-muted').trim() || '#71717a';

  ['lbl-n','lbl-e','lbl-s','lbl-w'].forEach(function(id) {
    var el = document.getElementById(id);
    if (el) el.setAttribute('fill', cLbl);
  });

  var cx = 210, cy = 210, rOuter = 175;
  var TICK_LEN = 24;
  var TICK_W = 4.5;
  var TICK_W_LIT = 6;
  var N = 72;
  var bearing = 305;

  for (var i = 0; i < N; i++) {
    var deg = (i / N) * 360;
    var a = (deg - 90) * Math.PI / 180;
    var ax = Math.cos(a), ay = Math.sin(a);
    var x1 = cx + (rOuter - TICK_LEN) * ax;
    var y1 = cy + (rOuter - TICK_LEN) * ay;
    var x2 = cx + rOuter * ax;
    var y2 = cy + rOuter * ay;

    var diff = Math.abs(((deg - bearing + 540) % 360) - 180);
    var lit = diff < 8;

    var line = document.createElementNS(NS, 'line');
    line.setAttribute('x1', x1);
    line.setAttribute('y1', y1);
    line.setAttribute('x2', x2);
    line.setAttribute('y2', y2);
    line.setAttribute('stroke', lit ? cAcc : cTick);
    line.setAttribute('stroke-width', lit ? TICK_W_LIT : TICK_W);
    line.setAttribute('stroke-linecap', 'round');
    g.appendChild(line);
  }
})();
</script>
</body>
</html>
