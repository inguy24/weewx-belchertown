openapi: 3.1.0

info:
  title: weewx-clearskies-api
  version: 1.0.0
  summary: HTTP/JSON API for the Clear Skies dashboard
  description: |
    Read-only HTTP/JSON contract between `weewx-clearskies-api` and the
    `weewx-clearskies-dashboard` SPA.

    The api reads from a weewx archive database and from per-domain
    provider plugin modules per [ADR-038](../decisions/ADR-038-data-provider-module-organization.md);
    it returns canonical types per [ADR-010](../decisions/ADR-010-canonical-data-model.md).

    **Versioning** — URL path. Major bump only on breaking changes per
    [ADR-018](../decisions/ADR-018-api-versioning-policy.md). No support-window
    promise (AS-IS under GPL v3 per [ADR-003](../decisions/ADR-003-license.md)).

    **Errors** — every non-2xx response is `application/problem+json`
    (RFC 9457). Provider-domain errors carry `providerId`, `domain`,
    and `errorCode` (one of the [ADR-038](../decisions/ADR-038-data-provider-module-organization.md)
    taxonomy strings).

    **Auth** — no end-user authentication per
    [ADR-008](../decisions/ADR-008-auth-model.md). Optional shared secret
    in `X-Clearskies-Proxy-Auth` for cross-host proxy↔inner-service trust;
    browser SPAs do not send this.

    **Units** — every unit-bearing response includes a `units` object
    naming the unit per field per
    [ADR-019](../decisions/ADR-019-units-handling.md) and
    [ADR-010](../decisions/ADR-010-canonical-data-model.md). Server passes
    weewx `target_unit` through; no server-side conversion at v0.1.

    **Time** — UTC ISO-8601 with `Z` suffix on the wire. Display TZ is
    station-local per [ADR-020](../decisions/ADR-020-time-zone-handling.md).

    **Realtime** — the SSE stream from `weewx-clearskies-realtime` is
    documented separately. Both services share the `Observation` schema.

    The full canonical-field catalog (every weewx field, units per
    `target_unit` system, provider→canonical mapping tables) lives in
    `docs/contracts/canonical-data-model.md`.
  license:
    name: GPL-3.0-or-later
    url: https://www.gnu.org/licenses/gpl-3.0.html
  contact:
    name: Clear Skies (weewx-clearskies-api)
    url: https://github.com/inguy24/weewx-clearskies-api

servers:
  - url: /api/v1
    description: Public API listener (proxied via the one-door reverse proxy per ADR-037)
  - url: http://127.0.0.1:8081
    description: |
      Health and metrics listener. Loopback-bound by default per ADR-030;
      separate port from the public API; unauthenticated by virtue of
      loopback default.

tags:
  - name: Observations
    description: Current readings and historical archive from the weewx database.
  - name: Forecast
    description: Forecast bundle (hourly + daily + discussion) from the configured forecast provider.
  - name: Alerts
    description: Severe-weather alerts from the configured alerts provider.
  - name: AQI
    description: Air-quality readings (current + history). Source = configured AQI provider OR weewx archive columns per ADR-013.
  - name: Earthquakes
    description: Recent earthquakes from the configured earthquake provider per ADR-040.
  - name: Almanac
    description: Sun and moon ephemeris computed locally with skyfield per ADR-014.
  - name: Records
    description: Highs and lows per ADR-024 cat 11.
  - name: Reports
    description: Monthly NOAA-style summaries generated by weewx (raw text).
  - name: Charts
    description: Chart-group structure for the Charts page.
  - name: Pages
    description: Page list and ordering for the dashboard navigation per ADR-024.
  - name: Content
    description: Operator-authored markdown content (About, Legal).
  - name: Radar
    description: Radar tile proxy and frame metadata per ADR-015.
  - name: Station
    description: Station identity, location, time zone, units.
  - name: Capabilities
    description: Runtime capability registry (which providers configured, which canonical fields supplied) per ADR-038.
  - name: Climatology
    description: Monthly climatology averages computed from the weewx archive.
  - name: Branding
    description: Operator branding configuration (site title, logo, favicon, social links).
  - name: Health
    description: Health and readiness probes per ADR-030.

security:
  - {}                       # Default: no auth required (browser SPA case).
  - proxySecret: []          # Cross-host deploy: shared secret per ADR-008.

paths:

  # -------------------------------------------------------------------
  # Observations
  # -------------------------------------------------------------------

  /current:
    get:
      tags: [Observations]
      summary: Most recent observation
      description: |
        Returns the most recent archive record from the weewx database
        (the latest record within a small look-back window).
      operationId: getCurrent
      responses:
        '200':
          description: Current observation
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ObservationResponse' }
        '503': { $ref: '#/components/responses/ProviderUnavailable' }
        default: { $ref: '#/components/responses/Problem' }

  /archive:
    get:
      tags: [Observations]
      summary: Historical archive records
      description: |
        Returns archive records from the weewx database within the
        requested time window. Used by the Charts page (composes its
        own series from raw history) and the homepage chart panel.

        Pagination supports BOTH a forward `cursor` token AND
        page-number navigation; clients pick whichever fits per ADR
        (paginate sequentially with cursors, or jump to a known page).
      operationId: getArchive
      parameters:
        - { $ref: '#/components/parameters/From' }
        - { $ref: '#/components/parameters/To' }
        - { $ref: '#/components/parameters/Interval' }
        - { $ref: '#/components/parameters/Fields' }
        - { $ref: '#/components/parameters/Limit' }
        - { $ref: '#/components/parameters/Cursor' }
        - { $ref: '#/components/parameters/Page' }
        - name: agg
          in: query
          required: false
          description: >-
            Aggregation function override for interval=day and interval=hour.
            When omitted, per-field defaults apply (e.g., outTemp uses avg).
            For interval=raw, this parameter is silently ignored.
          schema:
            type: string
            enum: [min, max, avg, sum, count]
      responses:
        '200':
          description: Archive page
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ArchiveResponse' }
        default: { $ref: '#/components/responses/Problem' }

  /records:
    get:
      tags: [Records]
      summary: Highs and lows
      description: |
        Section-grouped records (Temperature / Wind / Rain / Humidity /
        Barometer / Sun / AQI). Each section self-hides when its backing
        data is unavailable.
      operationId: getRecords
      parameters:
        - name: period
          in: query
          required: false
          schema:
            type: string
            description: |
              `ytd`, `all-time`, or a four-digit year (e.g. `2025`).
              Default `ytd`.
            default: ytd
        - name: section
          in: query
          required: false
          description: Restrict to a single section. Omit for all.
          schema:
            type: string
            enum: [temperature, wind, rain, humidity, barometer, sun, aqi]
      responses:
        '200':
          description: Records bundle
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RecordsResponse' }
        default: { $ref: '#/components/responses/Problem' }

  # -------------------------------------------------------------------
  # Forecast
  # -------------------------------------------------------------------

  /forecast:
    get:
      tags: [Forecast]
      summary: Forecast bundle (hourly + daily + discussion)
      description: |
        From the configured forecast provider per ADR-007. Provider-
        specific fields not in the canonical model flow through `extras`.
      operationId: getForecast
      parameters:
        - name: hours
          in: query
          required: false
          description: Number of hourly points (provider-capped).
          schema: { type: integer, minimum: 0, default: 48 }
        - name: days
          in: query
          required: false
          description: Number of daily points (provider-capped).
          schema: { type: integer, minimum: 0, default: 7 }
      responses:
        '200':
          description: Forecast bundle
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ForecastResponse' }
        '502': { $ref: '#/components/responses/ProviderError' }
        '503': { $ref: '#/components/responses/ProviderUnavailable' }
        default: { $ref: '#/components/responses/Problem' }

  # -------------------------------------------------------------------
  # Alerts
  # -------------------------------------------------------------------

  /alerts:
    get:
      tags: [Alerts]
      summary: Active severe-weather alerts
      description: |
        From the configured alerts provider per ADR-016. Returns
        `alerts: []` (with `source` set) when the operator has no
        configured provider or the provider's coverage doesn't include
        the station — no error.
      operationId: getAlerts
      parameters:
        - name: minLevel
          in: query
          required: false
          schema:
            type: integer
            enum: [1, 2, 3, 4]
          description: "Filter alerts by minimum severity level. Records with null severityLevel are included when not specified, excluded when specified."
      responses:
        '200':
          description: Active alerts
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AlertListResponse' }
        '502': { $ref: '#/components/responses/ProviderError' }
        '503': { $ref: '#/components/responses/ProviderUnavailable' }
        default: { $ref: '#/components/responses/Problem' }

  # -------------------------------------------------------------------
  # AQI
  # -------------------------------------------------------------------

  /aqi/current:
    get:
      tags: [AQI]
      summary: Current AQI reading
      description: |
        Source = configured AQI provider OR weewx archive columns per
        ADR-013. Same canonical shape either way; `source` indicates
        which path was used.
      operationId: getAqiCurrent
      responses:
        '200':
          description: Current AQI
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AQIResponse' }
        '502': { $ref: '#/components/responses/ProviderError' }
        '503': { $ref: '#/components/responses/ProviderUnavailable' }
        default: { $ref: '#/components/responses/Problem' }

  /aqi/history:
    get:
      tags: [AQI]
      summary: Historical AQI readings
      description: |
        Reads from clearskies-api's own AQI history store (Path B,
        per ADR-013) OR from weewx archive AQI columns (Path A).
      operationId: getAqiHistory
      parameters:
        - { $ref: '#/components/parameters/From' }
        - { $ref: '#/components/parameters/To' }
        - { $ref: '#/components/parameters/Limit' }
        - { $ref: '#/components/parameters/Cursor' }
        - { $ref: '#/components/parameters/Page' }
      responses:
        '200':
          description: Historical AQI page
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AQIHistoryResponse' }
        default: { $ref: '#/components/responses/Problem' }

  # -------------------------------------------------------------------
  # Earthquakes
  # -------------------------------------------------------------------

  /earthquakes:
    get:
      tags: [Earthquakes]
      summary: Recent earthquakes within configured radius
      description: |
        From the configured earthquake provider per ADR-040
        (usgs / geonet / emsc / renass). Empty list when nothing in
        the time + radius window — not an error.
      operationId: getEarthquakes
      parameters:
        - name: from
          in: query
          required: false
          description: |
            Lower bound (UTC ISO 8601 with `Z`). Inclusive. Defaults to
            `now - config.defaultDays` when omitted.
          schema: { type: string, format: date-time }
        - { $ref: '#/components/parameters/To' }
        - name: min_magnitude
          in: query
          required: false
          description: |
            Filter to events at or above this magnitude. Defaults to
            `config.minMagnitude` when omitted.
          schema: { type: number, minimum: 0 }
        - name: radius_km
          in: query
          required: false
          description: |
            Override the operator-configured radius (kilometers from
            station lat/lon). Omit to use config default.
          schema: { type: number, minimum: 0 }
      responses:
        '200':
          description: Recent earthquakes
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EarthquakeListResponse' }
        '502': { $ref: '#/components/responses/ProviderError' }
        '503': { $ref: '#/components/responses/ProviderUnavailable' }
        default: { $ref: '#/components/responses/Problem' }

  /earthquakes/config:
    get:
      tags: [Earthquakes]
      summary: Earthquake provider configuration
      description: |
        Returns the active earthquake provider configuration: provider
        id, search radius, minimum magnitude threshold, and default
        query window in days. Useful for the dashboard to display
        the operator's configured defaults alongside the event list.
      operationId: getEarthquakesConfig
      responses:
        '200':
          description: Earthquake provider configuration
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EarthquakeConfigResponse' }
        default: { $ref: '#/components/responses/Problem' }

  /earthquakes/faults:
    get:
      tags: [Earthquakes]
      summary: Active fault lines (GeoJSON)
      description: |
        Returns a GeoJSON FeatureCollection of active fault lines from
        the GEM Global Active Faults Database (CC-BY-SA 4.0). Used to
        overlay fault lines on the dashboard's earthquake map.
        The `attribution` field carries the required attribution string.
      operationId: getEarthquakesFaults
      responses:
        '200':
          description: GeoJSON fault-line FeatureCollection
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EarthquakeFaultsResponse' }
        default: { $ref: '#/components/responses/Problem' }

  # -------------------------------------------------------------------
  # Almanac
  # -------------------------------------------------------------------

  /almanac:
    get:
      tags: [Almanac]
      summary: Sun and moon snapshot for a given date
      description: Skyfield-computed locally per ADR-014. Stateless given (lat, lon, date).
      operationId: getAlmanac
      parameters:
        - name: date
          in: query
          required: false
          description: ISO date (YYYY-MM-DD). Default = station-local today.
          schema: { type: string, format: date }
      responses:
        '200':
          description: Almanac snapshot
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AlmanacResponse' }
        default: { $ref: '#/components/responses/Problem' }

  /almanac/sun-times:
    get:
      tags: [Almanac]
      summary: Year-long sunrise / sunset / daylight series
      description: Drives the Almanac page's year-long charts.
      operationId: getSunTimes
      parameters:
        - name: year
          in: query
          required: false
          description: Four-digit year. Default = current year.
          schema: { type: integer, minimum: 1900 }
      responses:
        '200':
          description: Sun-times series
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SunTimesResponse' }
        default: { $ref: '#/components/responses/Problem' }

  /almanac/moon-phases:
    get:
      tags: [Almanac]
      summary: Moon-phase calendar
      description: |
        Returns a month grid (or full year) of moon phases for the
        Almanac page calendar. Each full-moon day includes special
        naming metadata: traditional name, and flags for harvest moon,
        blue moon, hunter's moon, and supermoon.
      operationId: getMoonPhases
      parameters:
        - name: year
          in: query
          required: false
          schema: { type: integer, minimum: 1900 }
        - name: month
          in: query
          required: false
          description: 1-12. Omit for the full year.
          schema: { type: integer, minimum: 1, maximum: 12 }
      responses:
        '200':
          description: Moon-phase calendar
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MoonPhaseResponse' }
        default: { $ref: '#/components/responses/Problem' }

  /almanac/planets:
    get:
      tags: [Almanac]
      summary: Planet visibility for a given date
      description: |
        Returns visible planets grouped by viewing window: evening sky,
        morning sky, and all-night. Each entry includes the planet's
        name, visual magnitude, rise time, and set time.
        Skyfield-computed locally per ADR-014.
      operationId: getAlmanacPlanets
      parameters:
        - name: date
          in: query
          required: false
          description: ISO date (YYYY-MM-DD). Default = station-local today.
          schema: { type: string, format: date }
      responses:
        '200':
          description: Planet visibility
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AlmanacPlanetsResponse' }
        default: { $ref: '#/components/responses/Problem' }

  /almanac/moon-names:
    get:
      tags: [Almanac]
      summary: Full moon names for a given year
      description: |
        Returns all full moons in the requested year with their
        traditional names and special flags (harvest moon, blue moon,
        hunter's moon, supermoon).
      operationId: getAlmanacMoonNames
      parameters:
        - name: year
          in: query
          required: false
          description: Four-digit year. Default = current year.
          schema: { type: integer, minimum: 1900 }
      responses:
        '200':
          description: Full moon names
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AlmanacMoonNamesResponse' }
        default: { $ref: '#/components/responses/Problem' }

  /almanac/eclipses:
    get:
      tags: [Almanac]
      summary: Lunar eclipses for a date range
      description: |
        Returns all lunar eclipses (penumbral, partial, or total) in
        the requested date window. Skyfield-computed locally per ADR-014.
        Optionally enriched with contact times, obscuration, and visibility
        from AstronomyAPI.com when that provider is configured.
      operationId: getAlmanacEclipses
      parameters:
        - { $ref: '#/components/parameters/From' }
        - { $ref: '#/components/parameters/To' }
      responses:
        '200':
          description: Lunar eclipse list
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AlmanacEclipsesResponse' }
        default: { $ref: '#/components/responses/Problem' }

  /almanac/eclipses/lunar:
    get:
      tags: [Almanac]
      summary: Lunar eclipses for a date range (explicit alias)
      description: |
        Alias for `/almanac/eclipses`. Returns all lunar eclipses
        (penumbral, partial, or total) in the requested date window.
        Skyfield-computed locally per ADR-014. Optionally enriched with
        contact times, obscuration, and visibility from AstronomyAPI.com
        when that provider is configured.
      operationId: getAlmanacEclipsesLunar
      parameters:
        - { $ref: '#/components/parameters/From' }
        - { $ref: '#/components/parameters/To' }
      responses:
        '200':
          description: Lunar eclipse list
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AlmanacEclipsesResponse' }
        default: { $ref: '#/components/responses/Problem' }

  /almanac/eclipses/solar:
    get:
      tags: [Almanac]
      summary: Solar eclipses for a date range
      description: |
        Returns all solar eclipses (total, annular, or partial) in the
        requested date window. Optionally enriched with contact times,
        obscuration, and visibility from AstronomyAPI.com when that
        provider is configured.
      operationId: getAlmanacEclipsesSolar
      parameters:
        - { $ref: '#/components/parameters/From' }
        - { $ref: '#/components/parameters/To' }
      responses:
        '200':
          description: Solar eclipse list
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SolarEclipseResponse' }
        default: { $ref: '#/components/responses/Problem' }

  /almanac/meteor-showers:
    get:
      tags: [Almanac]
      summary: Meteor showers for a given year
      description: |
        Returns notable meteor showers in the requested year with peak
        date, zenithal hourly rate (ZHR), radiant altitude, moon
        illumination at peak, and a computed viewing-conditions
        classification.
      operationId: getAlmanacMeteorShowers
      parameters:
        - name: year
          in: query
          required: false
          description: Four-digit year. Default = current year.
          schema: { type: integer, minimum: 1900 }
        - name: min_radiant_alt
          in: query
          required: false
          description: |
            Minimum radiant altitude in degrees at local midnight on the peak
            night. Showers whose radiant is below this threshold are excluded.
            When omitted, all showers in the window are returned regardless of
            altitude.
          schema: { type: number }
      responses:
        '200':
          description: Meteor shower list
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AlmanacMeteorShowersResponse' }
        default: { $ref: '#/components/responses/Problem' }

  /almanac/seeing-forecast:
    get:
      summary: Astronomical seeing forecast (72-hour, 3-hour intervals from 7Timer)
      tags: [Almanac]
      responses:
        '200':
          description: Seeing forecast data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SeeingForecastResponse'
        '404':
          description: Seeing provider not configured

  /almanac/positions:
    get:
      summary: Current sun and moon positions
      description: Real-time sun and moon azimuth/altitude computed at request time. No caching.
      operationId: getAlmanacPositions
      tags:
        - Almanac
      responses:
        '200':
          description: Current positions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PositionsResponse'

  # -------------------------------------------------------------------
  # Climatology
  # -------------------------------------------------------------------

  /climatology/monthly:
    get:
      tags: [Climatology]
      summary: Monthly climatology averages
      description: |
        Returns 12-element arrays of historical monthly averages derived
        from the weewx archive: average high temp, average low temp,
        average dewpoint, and average rainfall. Fields self-hide when
        the corresponding columns are absent from the capability
        registry. Every array is either 12 elements (one per month,
        Jan–Dec) or omitted entirely — no partial arrays.
      operationId: getClimatologyMonthly
      parameters:
        - name: fields
          in: query
          required: false
          description: |
            Comma-separated list of canonical field names to include
            (e.g. `outTemp,rain`). Omit to return all available fields.
          schema: { type: string }
        - name: agg
          in: query
          required: false
          description: |
            Aggregation type to apply. Omit to use the server default
            (`avg_max` / `avg_min` pair for temperatures, `avg_monthly_total`
            for rain).
          schema:
            type: string
            enum: [avg_max, avg_min, avg, avg_monthly_total, sum]
      responses:
        '200':
          description: Monthly climatology averages
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ClimatologyMonthlyResponse' }
        default: { $ref: '#/components/responses/Problem' }

  # -------------------------------------------------------------------
  # Station / units / capabilities
  # -------------------------------------------------------------------

  /station:
    get:
      tags: [Station]
      summary: Station identity and metadata
      operationId: getStation
      responses:
        '200':
          description: Station metadata
          content:
            application/json:
              schema: { $ref: '#/components/schemas/StationResponse' }
        default: { $ref: '#/components/responses/Problem' }

  /branding:
    get:
      tags: [Branding]
      summary: Operator branding configuration
      deprecated: true
      description: |
        **Deprecated** — branding config moves to static file served by Caddy
        (`/branding.json`). See ADR-022 amendment 2026-06-10. This endpoint
        will be removed in a future release.

        Returns the operator-configured branding metadata: site title,
        logo (light and dark variants), favicon URL, and social media
        profile links. Fields are omitted when not configured.
      operationId: getBranding
      responses:
        '200':
          description: Branding configuration
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BrandingResponse' }
        default: { $ref: '#/components/responses/Problem' }

  /capabilities:
    get:
      tags: [Capabilities]
      summary: Runtime capability registry
      description: |
        Per ADR-038, the union of all configured-and-enabled provider
        modules' capability declarations, plus the operator's
        column-mapping decisions per ADR-035. Drives the dashboard's
        sensor-availability self-hide behaviour (ADR-024 cat 10).
      operationId: getCapabilities
      responses:
        '200':
          description: Capability registry
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CapabilityResponse' }
        default: { $ref: '#/components/responses/Problem' }

  /pages:
    get:
      tags: [Pages]
      summary: Dashboard navigation list
      description: |
        Built-in pages per ADR-024 plus operator-defined custom pages.
        Hidden pages omitted; custom-page slugs come from operator config.
      operationId: getPages
      responses:
        '200':
          description: Page list
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PageListResponse' }
        default: { $ref: '#/components/responses/Problem' }

  /pages/{slug}/content:
    get:
      tags: [Pages]
      summary: Page markdown content
      description: |
        Returns operator-authored markdown content for a named page (ADR-024).
        The slug must identify a known page (built-in or custom).  Hidden pages
        are still servable — content can be pre-authored before the page is
        made visible.

        Returns an empty-string markdown with null updatedAt when the page
        exists but no content file has been placed in the content directory.
        This is not an error; it means the operator has not authored content
        for that page yet.
      operationId: getPageContent
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
          description: Page slug (e.g. "now", "about", "legal").
      responses:
        '200':
          description: Page markdown content (may be empty string if not yet authored)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MarkdownResponse' }
        default: { $ref: '#/components/responses/Problem' }

  /charts/groups:
    get:
      tags: [Charts]
      summary: Chart-group structure
      description: |
        Built-in groups (`homepage`, `monthly`, `ANNUAL`,
        `averageclimate`) plus operator-defined custom groups.
        Each group declares its member fields; the dashboard
        composes time-series data via `/archive`.
      operationId: getChartGroups
      responses:
        '200':
          description: Chart groups
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ChartGroupResponse' }
        default: { $ref: '#/components/responses/Problem' }

  /charts/config:
    get:
      tags: [Charts]
      summary: Full chart configuration
      description: |
        Returns the full operator chart configuration tree including all
        groups, charts, and series that survived pruning against the
        ColumnRegistry at startup.
      operationId: getChartsConfig
      responses:
        '200':
          description: Full chart configuration
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ChartsConfigResponse' }
        default: { $ref: '#/components/responses/Problem' }

  /charts/custom-query/{series_id}:
    get:
      tags: [Charts]
      summary: Custom SQL query chart data
      description: |
        Execute a pre-validated custom SQL query defined in `charts.conf`.
        The SQL never crosses the HTTP boundary — the `series_id` path
        parameter maps to a query loaded and validated at API startup.
        Security: read-only transaction, 10s timeout, DDL keyword blocklist.
      operationId: getCustomQuery
      parameters:
        - name: series_id
          in: path
          required: true
          schema: { type: string }
          description: Identifier of the custom query series from `charts.conf`.
        - name: from
          in: query
          required: false
          schema: { type: string, format: date-time }
          description: ISO 8601 start datetime (passed as `:from_ts` bind parameter if the query uses it).
        - name: to
          in: query
          required: false
          schema: { type: string, format: date-time }
          description: ISO 8601 end datetime (passed as `:to_ts` bind parameter if the query uses it).
      responses:
        '200':
          description: Custom query result
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CustomQueryResponse' }
        '404':
          description: No validated query found for the given series_id
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
        default: { $ref: '#/components/responses/Problem' }

  # -------------------------------------------------------------------
  # Reports (NOAA monthly summaries from weewx)
  # -------------------------------------------------------------------

  /reports:
    get:
      tags: [Reports]
      summary: Available NOAA report files
      description: |
        Lists the year/month options the dashboard's Reports page can
        offer. Derived from the `NOAA-*.txt` files weewx has actually
        written to its report directory — both monthly
        (`NOAA-YYYY-MM.txt` from `[[SummaryByMonth]]`) and yearly
        (`NOAA-YYYY.txt` from `[[SummaryByYear]]`). Each entry's
        `kind` distinguishes them. Empty options never appear.
      operationId: getReportIndex
      responses:
        '200':
          description: Report index
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ReportIndexResponse' }
        default: { $ref: '#/components/responses/Problem' }

  /reports/{year}/{month}:
    get:
      tags: [Reports]
      summary: One NOAA monthly report (raw text)
      description: |
        Returns the unmodified contents of the corresponding
        `NOAA-{year}-{month}.txt` file weewx generated. The dashboard
        parses the fixed-width text into a sortable table client-side.
      operationId: getReport
      parameters:
        - name: year
          in: path
          required: true
          schema: { type: integer, minimum: 1900 }
        - name: month
          in: path
          required: true
          schema: { type: integer, minimum: 1, maximum: 12 }
      responses:
        '200':
          description: Raw report text
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ReportResponse' }
        '404':
          description: Report file does not exist
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
        default: { $ref: '#/components/responses/Problem' }

  /reports/{year}:
    get:
      tags: [Reports]
      summary: One NOAA yearly report (raw text)
      description: |
        Returns the unmodified contents of the corresponding
        `NOAA-{year}.txt` file weewx generated via
        `[[SummaryByYear]]`. Format is the same fixed-width NOAA
        layout as the monthly summary, but spans a full year.
      operationId: getYearlyReport
      parameters:
        - name: year
          in: path
          required: true
          schema: { type: integer, minimum: 1900 }
      responses:
        '200':
          description: Raw report text
          content:
            application/json:
              schema: { $ref: '#/components/schemas/YearlyReportResponse' }
        '404':
          description: Report file does not exist
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
        default: { $ref: '#/components/responses/Problem' }

  # -------------------------------------------------------------------
  # Operator-authored content (About / Legal)
  # -------------------------------------------------------------------

  /content/about:
    get:
      tags: [Content]
      summary: About-page markdown content
      operationId: getAboutContent
      responses:
        '200':
          description: About content
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MarkdownResponse' }
        default: { $ref: '#/components/responses/Problem' }

  /content/legal:
    get:
      tags: [Content]
      summary: Legal/privacy page markdown content
      operationId: getLegalContent
      responses:
        '200':
          description: Legal content
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MarkdownResponse' }
        default: { $ref: '#/components/responses/Problem' }

  # -------------------------------------------------------------------
  # Radar
  # -------------------------------------------------------------------

  /radar/providers/{provider_id}/tiles/{z}/{x}/{y}:
    get:
      tags: [Radar]
      summary: Radar map-tile proxy (for keyed providers)
      description: |
        Server-side proxy per ADR-015 + ADR-037 — keys never reach the
        browser. Free keyless providers can be fetched directly by the
        browser; this proxy is for keyed paths (`aeris`,
        `openweathermap`).

        Tile content type and per-provider URL templates are declared
        by the radar capability registry; see `/capabilities`.
      operationId: getRadarTile
      parameters:
        - name: provider_id
          in: path
          required: true
          schema: { type: string }
        - name: z
          in: path
          required: true
          description: Slippy-map zoom level.
          schema: { type: integer, minimum: 0, maximum: 22 }
        - name: x
          in: path
          required: true
          description: Slippy-map tile X.
          schema: { type: integer, minimum: 0 }
        - name: y
          in: path
          required: true
          description: Slippy-map tile Y.
          schema: { type: integer, minimum: 0 }
        - name: t
          in: query
          required: false
          description: |
            Frame timestamp for time-stepped sources. ISO 8601 UTC.
            Omit for the source's "current" frame.
          schema: { type: string, format: date-time }
      responses:
        '200':
          description: Tile image bytes
          content:
            image/png: { schema: { type: string, format: binary } }
            image/webp: { schema: { type: string, format: binary } }
            image/jpeg: { schema: { type: string, format: binary } }
        '404':
          description: Tile not produced (zoom out of range, etc.)
        '502': { $ref: '#/components/responses/ProviderError' }
        '503': { $ref: '#/components/responses/ProviderUnavailable' }
        default: { $ref: '#/components/responses/Problem' }

  /radar/providers/{provider_id}/frames:
    get:
      tags: [Radar]
      summary: Available radar frames (timestamps)
      description: For time-stepped tile sources. Drives the radar tab's frame-replay control.
      operationId: getRadarFrames
      parameters:
        - name: provider_id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Frame list
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RadarFramesResponse' }
        default: { $ref: '#/components/responses/Problem' }

  # -------------------------------------------------------------------
  # Health (loopback listener — second `servers` entry)
  # -------------------------------------------------------------------

  /health/live:
    get:
      tags: [Health]
      summary: Liveness probe
      description: |
        Returns 200 when the process is responsive. No external
        dependencies checked. Used by orchestrators for "is the process
        dead?" decisions.
      operationId: getHealthLive
      security: []
      servers:
        - url: http://127.0.0.1:8081
      responses:
        '200':
          description: Process is alive
          content:
            application/json:
              schema: { $ref: '#/components/schemas/HealthStatus' }

  /health/ready:
    get:
      tags: [Health]
      summary: Readiness probe
      description: |
        Returns 200 when the service is ready to serve, including a
        `degraded` state where one or more non-critical dependencies are
        failing but the service can still handle most requests. Returns
        503 only when the service genuinely cannot serve. See ADR-030.
      operationId: getHealthReady
      security: []
      servers:
        - url: http://127.0.0.1:8081
      responses:
        '200':
          description: Ready (or degraded but serving)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/HealthStatus' }
        '503':
          description: Not ready
          content:
            application/json:
              schema: { $ref: '#/components/schemas/HealthStatus' }

# =====================================================================
# Components
# =====================================================================

components:

  # -------------------------------------------------------------------
  # Security
  # -------------------------------------------------------------------

  securitySchemes:
    proxySecret:
      type: apiKey
      in: header
      name: X-Clearskies-Proxy-Auth
      description: |
        Shared secret per [ADR-008](../decisions/ADR-008-auth-model.md).
        For PROXY-to-INNER-SERVICE trust on cross-host deploys only.
        Browser SPAs MUST NOT send this header. When the inner service
        has `WEEWX_CLEARSKIES_PROXY_SECRET` unset, the header is
        ignored.

  # -------------------------------------------------------------------
  # Reusable parameters
  # -------------------------------------------------------------------

  parameters:
    From:
      name: from
      in: query
      required: false
      description: Lower bound (UTC ISO 8601 with `Z`). Inclusive.
      schema: { type: string, format: date-time }
    To:
      name: to
      in: query
      required: false
      description: Upper bound (UTC ISO 8601 with `Z`). Exclusive.
      schema: { type: string, format: date-time }
    Interval:
      name: interval
      in: query
      required: false
      description: |
        Aggregation level. `raw` returns archive-interval rows
        unchanged; `hour` and `day` return the corresponding weewx
        aggregations.
      schema:
        type: string
        enum: [raw, hour, day]
        default: raw
    Fields:
      name: fields
      in: query
      required: false
      description: |
        Comma-separated list of canonical field names (e.g.
        `outTemp,outHumidity,windSpeed`). Omit to return all available.
      schema: { type: string }
    Limit:
      name: limit
      in: query
      required: false
      description: Maximum records per page.
      schema: { type: integer, minimum: 1, maximum: 10000, default: 1000 }
    Cursor:
      name: cursor
      in: query
      required: false
      description: |
        Opaque pagination token from a prior response's `page.cursor`.
        Mutually exclusive with `page`.
      schema: { type: string }
    Page:
      name: page
      in: query
      required: false
      description: |
        1-based page number. Mutually exclusive with `cursor`.
        Useful for direct navigation; cursor is preferred for
        sequential iteration of large archives.
      schema: { type: integer, minimum: 1 }

  # -------------------------------------------------------------------
  # Reusable responses
  # -------------------------------------------------------------------

  responses:
    Problem:
      description: Generic error (RFC 9457 problem+json)
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
    ProviderError:
      description: |
        Upstream provider failure. `errorCode` carries the ADR-038
        taxonomy string (`KeyInvalid`, `TransientNetworkError`,
        `ProviderProtocolError`).
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/ProviderProblem' }
    ProviderUnavailable:
      description: |
        Provider quota exhausted or temporarily unavailable. May carry
        `Retry-After`.
      headers:
        Retry-After:
          description: Seconds to wait before retrying.
          schema: { type: integer, minimum: 0 }
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/ProviderProblem' }

  # -------------------------------------------------------------------
  # Schemas — envelope + error
  # -------------------------------------------------------------------

  schemas:

    UnitsBlock:
      type: object
      description: |
        Map of canonical field name → unit string. Per ADR-019: the
        unit reflects whatever weewx is configured to write that
        field in (its `target_unit`). Server does not convert.
      additionalProperties:
        type: string
        examples: ["°F", "°C", "mph", "km/h", "m/s", "inHg", "hPa", "in", "mm"]
      examples:
        - { outTemp: "°F", windSpeed: "mph", barometer: "inHg", rain: "in" }

    PageInfo:
      type: object
      description: Pagination metadata. Both cursor and page-number forms supplied.
      properties:
        cursor: { type: string, description: "Opaque token for the next page; null on the last page." }
        next: { type: string, format: uri-reference, description: "Convenience URL of the next page." }
        previous: { type: string, format: uri-reference }
        limit: { type: integer }
        page: { type: integer, description: "1-based current page number." }
        totalPages: { type: integer }
        totalRecords: { type: integer }
      required: [limit]

    Problem:
      type: object
      description: RFC 9457 Problem Details.
      properties:
        type: { type: string, format: uri, description: "URI identifying the problem type." }
        title: { type: string }
        status: { type: integer, minimum: 100, maximum: 599 }
        detail: { type: string }
        instance: { type: string, format: uri-reference }
      required: [title, status]
      examples:
        - { type: "https://clearskies.weewx.org/errors/validation", title: "Invalid query", status: 400, detail: "limit must be between 1 and 10000", instance: "/api/v1/archive" }

    ProviderProblem:
      allOf:
        - { $ref: '#/components/schemas/Problem' }
        - type: object
          properties:
            providerId:
              type: string
              description: Stable provider id (e.g. "aeris", "usgs", "openmeteo").
            domain:
              type: string
              enum: [forecast, alerts, aqi, earthquakes, radar]
            errorCode:
              type: string
              enum: [QuotaExhausted, KeyInvalid, GeographicallyUnsupported, FieldUnsupported, TransientNetworkError, ProviderProtocolError]
            retryAfterSeconds: { type: integer, minimum: 0 }

    # ---------- Canonical entities (per ADR-010) ----------

    Observation:
      type: object
      description: |
        Most-recent point reading from the weewx archive. The field
        set is the FULL weewx-stock canonical observation column set
        (wview + wview_extended). Every stock weewx archive column
        is a first-class field on this schema; operator-custom
        columns route through `extras` per ADR-035.

        Operators with archive schemas that omit a field (e.g., a
        wview-only install will not have `appTemp`) see `null` for
        that field; the JSON key is always present.

        Full per-field unit mapping per `target_unit` system lives in
        `docs/contracts/canonical-data-model.md`.
      properties:
        # Timestamp (always present)
        timestamp: { type: string, format: date-time }

        # Core wview observation fields
        outTemp: { type: number, nullable: true }
        outHumidity: { type: number, nullable: true }
        windSpeed: { type: number, nullable: true }
        windDir: { type: number, nullable: true }
        windGust: { type: number, nullable: true }
        windGustDir: { type: number, nullable: true }
        windSpeedAvg10m:
          type: number
          nullable: true
          description: API-derived 10-minute sustained average wind speed (in operator display units)
        windGustMax10m:
          type: number
          nullable: true
          description: API-derived 10-minute maximum gust (in operator display units)
        barometer: { type: number, nullable: true }
        pressure: { type: number, nullable: true }
        altimeter: { type: number, nullable: true }
        dewpoint: { type: number, nullable: true }
        windchill: { type: number, nullable: true }
        heatindex: { type: number, nullable: true }
        rainRate: { type: number, nullable: true }
        rain: { type: number, nullable: true }
        radiation: { type: number, nullable: true }
        UV: { type: number, nullable: true }
        inTemp: { type: number, nullable: true }
        inHumidity: { type: number, nullable: true }

        # wview_extended core fields
        ET: { type: number, nullable: true }
        hail: { type: number, nullable: true }
        hailRate: { type: number, nullable: true }
        appTemp: { type: number, nullable: true }
        cloudbase: { type: number, nullable: true }
        cloudcover: { type: number, nullable: true }
        windrun: { type: number, nullable: true }
        maxSolarRad: { type: number, nullable: true }
        sunshineDur: { type: number, nullable: true }
        daySunshineDur: { type: number, nullable: true }
        rainDur: { type: number, nullable: true }
        THSW: { type: number, nullable: true }
        humidex: { type: number, nullable: true }
        pop: { type: number, nullable: true }
        illuminance: { type: number, nullable: true }
        noise: { type: number, nullable: true }

        # Lightning (wview_extended)
        lightning_strike_count: { type: number, nullable: true }
        lightning_distance: { type: number, nullable: true }
        lightning_noise_count: { type: number, nullable: true }
        lightning_disturber_count: { type: number, nullable: true }
        lightningStrikeHistory:
          type: array
          nullable: true
          description: Rolling 24h window of detected lightning strikes (time + distance pairs). Null when lightning detection is unavailable. Empty array when no strikes in the window.
          items:
            type: object
            properties:
              time:
                type: string
                description: ISO 8601 timestamp of the detected strike
              distance:
                type: number
                description: Distance to the strike in the station's configured distance unit

        # Snow (wview_extended)
        snow: { type: number, nullable: true }
        snowDepth: { type: number, nullable: true }
        snowRate: { type: number, nullable: true }

        # Wind summary fields (when present in archive vs archive_day_wind)
        vecdir: { type: number, nullable: true }
        gustdir: { type: number, nullable: true }
        vecavg: { type: number, nullable: true }
        rms: { type: number, nullable: true }

        # Degree-days
        heatdeg: { type: number, nullable: true }
        cooldeg: { type: number, nullable: true }

        # Sensor expansion slots (wview_extended)
        extraTemp1: { type: number, nullable: true }
        extraTemp2: { type: number, nullable: true }
        extraTemp3: { type: number, nullable: true }
        extraHumid1: { type: number, nullable: true }
        extraHumid2: { type: number, nullable: true }
        soilTemp1: { type: number, nullable: true }
        soilTemp2: { type: number, nullable: true }
        soilTemp3: { type: number, nullable: true }
        soilTemp4: { type: number, nullable: true }
        soilMoist1: { type: number, nullable: true }
        soilMoist2: { type: number, nullable: true }
        soilMoist3: { type: number, nullable: true }
        soilMoist4: { type: number, nullable: true }
        leafTemp1: { type: number, nullable: true }
        leafTemp2: { type: number, nullable: true }
        leafWet1: { type: number, nullable: true }
        leafWet2: { type: number, nullable: true }

        # Electrical / system telemetry
        consBatteryVoltage: { type: number, nullable: true }
        heatingVoltage: { type: number, nullable: true }
        referenceVoltage: { type: number, nullable: true }
        supplyVoltage: { type: number, nullable: true }
        rxCheckPercent: { type: number, nullable: true }

        # Operator-custom columns (per ADR-035)
        extras:
          type: object
          description: |
            Operator-custom weewx columns keyed by the weewx column
            name verbatim. Stock weewx columns NEVER appear here —
            they are first-class fields above. `extras` is the
            operator-extension surface (ADR-035 mapping flow). May
            be empty.
          additionalProperties:
            anyOf:
              - { type: number }
              - { type: integer }
              - { type: string }
              - { type: boolean }
              - { type: 'null' }
        source:
          type: string
          description: Always `"weewx"` for archive-derived records.
      required: [timestamp, source]

    ArchiveRecord:
      allOf:
        - { $ref: '#/components/schemas/Observation' }
        - type: object
          properties:
            interval:
              type: integer
              description: Archive interval length in minutes (typical 5).
          required: [interval]

    HourlyForecastPoint:
      type: object
      properties:
        validTime: { type: string, format: date-time }
        outTemp: { type: number, nullable: true }
        outHumidity: { type: number, nullable: true }
        windSpeed: { type: number, nullable: true }
        windDir: { type: number, nullable: true }
        windGust: { type: number, nullable: true }
        precipProbability: { type: number, nullable: true, minimum: 0, maximum: 100 }
        precipAmount: { type: number, nullable: true }
        precipType: { type: string, nullable: true }
        cloudCover: { type: number, nullable: true, minimum: 0, maximum: 100 }
        weatherCode: { type: string, nullable: true }
        weatherText: { type: string, nullable: true }
        source: { type: string }
        extras: { $ref: '#/components/schemas/Observation/properties/extras' }
      required: [validTime, source]

    DailyForecastPoint:
      type: object
      properties:
        validDate: { type: string, format: date }
        tempMax: { type: number, nullable: true }
        tempMin: { type: number, nullable: true }
        precipAmount: { type: number, nullable: true }
        precipProbabilityMax: { type: number, nullable: true, minimum: 0, maximum: 100 }
        windSpeedMax: { type: number, nullable: true }
        windGustMax: { type: number, nullable: true }
        sunrise: { type: string, format: date-time, nullable: true }
        sunset: { type: string, format: date-time, nullable: true }
        uvIndexMax: { type: number, nullable: true }
        weatherCode: { type: string, nullable: true }
        weatherText: { type: string, nullable: true }
        narrative:
          type: string
          nullable: true
          description: Multi-sentence per-day summary (NWS, some Aeris plans).
        dewpointMax: { type: number, nullable: true }
        dewpointMin: { type: number, nullable: true }
        humidityMax: { type: number, nullable: true, minimum: 0, maximum: 100 }
        humidityMin: { type: number, nullable: true, minimum: 0, maximum: 100 }
        visibilityMax: { type: number, nullable: true }
        visibilityMin: { type: number, nullable: true }
        snowAmount: { type: number, nullable: true }
        thunderRisk: { type: number, nullable: true }
        tornadoRisk: { type: number, nullable: true }
        hailRisk: { type: number, nullable: true }
        windRisk: { type: number, nullable: true }
        source: { type: string }
        extras: { $ref: '#/components/schemas/Observation/properties/extras' }
      required: [validDate, source]

    ForecastDiscussion:
      type: object
      description: Free-form prose forecast (NWS AFD or equivalent).
      properties:
        headline: { type: string }
        body:
          type: string
          description: Plain text or basic Markdown.
        issuedAt: { type: string, format: date-time }
        validFrom: { type: string, format: date-time, nullable: true }
        validUntil: { type: string, format: date-time, nullable: true }
        senderName: { type: string, nullable: true }
        source: { type: string }
      required: [body, issuedAt, source]

    ForecastBundle:
      type: object
      properties:
        hourly:
          type: array
          items: { $ref: '#/components/schemas/HourlyForecastPoint' }
        daily:
          type: array
          items: { $ref: '#/components/schemas/DailyForecastPoint' }
        discussion:
          oneOf:
            - { $ref: '#/components/schemas/ForecastDiscussion' }
            - { type: 'null' }
        source: { type: string }
        generatedAt: { type: string, format: date-time }
      required: [hourly, daily, source, generatedAt]

    AlertRecord:
      type: object
      properties:
        id: { type: string }
        headline: { type: string }
        description: { type: string }
        urgency: { type: string, nullable: true }
        certainty: { type: string, nullable: true }
        event: { type: string }
        effective: { type: string, format: date-time }
        expires: { type: string, format: date-time, nullable: true }
        senderName: { type: string, nullable: true }
        areaDesc: { type: string, nullable: true }
        category: { type: string, nullable: true }
        source: { type: string }
        severityLevel:
          type: integer
          nullable: true
          enum: [1, 2, 3, 4]
          description: "Ordinal severity level (1=lowest, 4=highest). Null for passthrough providers."
        severityLabel:
          type: string
          nullable: true
          description: "Human-readable severity label, locale-appropriate (e.g., 'Warning', 'Amber', 'Vigilance jaune')."
        alertSystem:
          type: string
          nullable: true
          description: "Originating alert system identifier (e.g., 'nws', 'meteoalarm', 'ukmet')."
        hazardType:
          type: string
          nullable: true
          description: "Hazard category (e.g., 'thunderstorm', 'fire', 'earthquake')."
        nativeName:
          type: string
          nullable: true
          description: "Alert name in original language."
        color:
          type: string
          nullable: true
          description: "Provider-supplied hex color code."
      required: [id, headline, event, effective, source]

    AlertList:
      type: object
      properties:
        alerts:
          type: array
          items: { $ref: '#/components/schemas/AlertRecord' }
        retrievedAt: { type: string, format: date-time }
        source: { type: string }
      required: [alerts, retrievedAt, source]

    EarthquakeRecord:
      type: object
      description: |
        Per ADR-010 / ADR-040. Required fields are what every
        provider supplies; optional fields are what some providers
        supply (USGS PAGER alert, GeoNet MMI, etc.).
      properties:
        id: { type: string, description: "Provider's stable event ID." }
        time: { type: string, format: date-time }
        latitude: { type: number, minimum: -90, maximum: 90 }
        longitude: { type: number, minimum: -180, maximum: 180 }
        magnitude: { type: number }
        magnitudeType:
          type: string
          nullable: true
          description: e.g. mw, ml, md, mb.
        depth:
          type: number
          nullable: true
          description: Kilometers below surface.
        place:
          type: string
          nullable: true
          description: Human-readable location ("12 km NE of Wellington").
        url: { type: string, format: uri, nullable: true }
        tsunami: { type: boolean, nullable: true }
        felt:
          type: integer
          nullable: true
          description: Count of "did you feel it" reports (USGS).
        mmi:
          type: number
          nullable: true
          description: Modified Mercalli Intensity (USGS estimate or GeoNet measured).
        alert:
          type: string
          nullable: true
          enum: [green, yellow, orange, red, null]
          description: USGS PAGER alert level.
        status:
          type: string
          nullable: true
          description: Review status (provider-dependent vocabulary).
        extras: { $ref: '#/components/schemas/Observation/properties/extras' }
        source: { type: string }
      required: [id, time, latitude, longitude, magnitude, source]

    AQIReading:
      type: object
      properties:
        aqi: { type: number, nullable: true }
        aqiCategory:
          type: string
          nullable: true
          description: |
            EPA category name (Good / Moderate / Unhealthy for
            Sensitive Groups / Unhealthy / Very Unhealthy / Hazardous).
        aqiMainPollutant:
          type: string
          nullable: true
          description: Canonical pollutant identifier (e.g. "PM2.5", "O3").
        aqiLocation: { type: string, nullable: true }
        pollutantPM25: { type: number, nullable: true }
        pollutantPM10: { type: number, nullable: true }
        pollutantO3: { type: number, nullable: true }
        pollutantNO2: { type: number, nullable: true }
        pollutantSO2: { type: number, nullable: true }
        pollutantCO: { type: number, nullable: true }
        pollutantSubIndices:
          type: object
          nullable: true
          description: |
            Per-pollutant AQI sub-index values on the same scale as `aqi`.
            Keys are canonical pollutant ids (PM2.5, PM10, O3, NO2, SO2, CO).
            Null when provider doesn't supply (IQAir free tier, weewx Path A).
          additionalProperties: { type: number, nullable: true }
        observedAt: { type: string, format: date-time }
        source:
          type: string
          description: |
            `"weewx"` when read from archive columns (Path A);
            provider id when from a clearskies-api AQI module (Path B).
      required: [observedAt, source]

    StationMetadata:
      type: object
      properties:
        stationId:
          type: string
          description: |
            Stable identifier for the station. v0.1 single-station
            (per ADR-011) — typically derived from operator config.
        name: { type: string }
        latitude: { type: number, minimum: -90, maximum: 90 }
        longitude: { type: number, minimum: -180, maximum: 180 }
        altitude: { type: number, description: "Above mean sea level. Value is in the unit named by `units.altitude` per ADR-019; server emits whatever unit weewx is configured to write (no server-side conversion)." }
        timezone:
          type: string
          description: |
            IANA TZ identifier (e.g. "America/New_York"). Source
            priority per ADR-020.
        timezoneOffsetMinutes:
          type: integer
          description: Current offset from UTC in minutes.
        unitSystem:
          type: string
          enum: [US, METRIC, METRICWX]
          description: Active weewx target_unit per ADR-019.
        firstRecord: { type: string, format: date-time, nullable: true }
        lastRecord: { type: string, format: date-time, nullable: true }
        hardware: { type: string, nullable: true }
        defaultLocale:
          type: string
          description: |
            Default locale for the dashboard (ADR-021). One of the 13 supported
            locale codes. The dashboard uses this as the initial language, with
            browser preference as a fallback.
          example: "en"
      required: [stationId, name, latitude, longitude, altitude, timezone, unitSystem]

    # ---------- Almanac entities ----------

    AlmanacSnapshot:
      type: object
      description: Sun + moon snapshot for a given date. Skyfield-computed.
      properties:
        date: { type: string, format: date }
        sun:
          type: object
          properties:
            rise: { type: string, format: date-time, nullable: true }
            set: { type: string, format: date-time, nullable: true }
            transit: { type: string, format: date-time, nullable: true }
            civilTwilightDawn: { type: string, format: date-time, nullable: true }
            civilTwilightDusk: { type: string, format: date-time, nullable: true }
            azimuth: { type: number, nullable: true }
            altitude: { type: number, nullable: true }
            rightAscension: { type: number, nullable: true }
            declination: { type: number, nullable: true }
            daylightMinutes: { type: integer, nullable: true }
            daylightDeltaVsYesterdayMinutes: { type: integer, nullable: true }
            nextEquinox: { type: string, format: date-time, nullable: true }
            nextSolstice: { type: string, format: date-time, nullable: true }
        moon:
          type: object
          properties:
            rise: { type: string, format: date-time, nullable: true }
            set: { type: string, format: date-time, nullable: true }
            transit: { type: string, format: date-time, nullable: true }
            azimuth: { type: number, nullable: true }
            altitude: { type: number, nullable: true }
            rightAscension: { type: number, nullable: true }
            declination: { type: number, nullable: true }
            phaseName:
              type: string
              nullable: true
              enum: [new, waxing-crescent, first-quarter, waxing-gibbous, full, waning-gibbous, last-quarter, waning-crescent, null]
            illuminationPercent: { type: number, nullable: true, minimum: 0, maximum: 100 }
            nextFullMoon: { type: string, format: date-time, nullable: true }
            nextNewMoon: { type: string, format: date-time, nullable: true }
      required: [date, sun, moon]

    SunTimesSeries:
      type: object
      properties:
        year: { type: integer }
        days:
          type: array
          items:
            type: object
            properties:
              date: { type: string, format: date }
              sunrise: { type: string, format: date-time, nullable: true }
              sunset: { type: string, format: date-time, nullable: true }
              daylightMinutes: { type: integer, nullable: true }
            required: [date]
      required: [year, days]

    MoonPhaseCalendar:
      type: object
      properties:
        year: { type: integer }
        month:
          type: integer
          nullable: true
          description: Null when the response is the full year.
        days:
          type: array
          items:
            type: object
            properties:
              date: { type: string, format: date }
              phaseName: { $ref: '#/components/schemas/AlmanacSnapshot/properties/moon/properties/phaseName' }
              illuminationPercent: { type: number, minimum: 0, maximum: 100 }
              traditionalName:
                type: string
                nullable: true
                description: |
                  Traditional name for the full moon (e.g. "Wolf",
                  "Snow"). Present only on full-moon days; null otherwise.
              isHarvestMoon:
                type: boolean
                nullable: true
                description: Full-moon days only; null on non-full days.
              isBlueMoon:
                type: boolean
                nullable: true
                description: Full-moon days only; null on non-full days.
              isHuntersMoon:
                type: boolean
                nullable: true
                description: Full-moon days only; null on non-full days.
              isSupermoon:
                type: boolean
                nullable: true
                description: Full-moon days only; null on non-full days.
            required: [date, phaseName, illuminationPercent]
      required: [year, days]

    # ---------- Almanac extended entities ----------

    FullMoonEntry:
      type: object
      description: One full moon in the year, with traditional name and special flags.
      properties:
        date: { type: string, format: date }
        traditionalName: { type: string, nullable: true }
        isHarvestMoon: { type: boolean }
        isBlueMoon: { type: boolean }
        isHuntersMoon: { type: boolean }
        isSupermoon: { type: boolean }
      required: [date, isHarvestMoon, isBlueMoon, isHuntersMoon, isSupermoon]

    PlanetEntry:
      type: object
      description: One visible planet's visibility data for the requested date.
      properties:
        name: { type: string, description: "Planet name (e.g. Venus, Mars, Jupiter)." }
        altitude:
          type: number
          nullable: true
          description: Altitude in degrees above the horizon at the reference viewing time.
        direction:
          type: string
          nullable: true
          description: 16-point compass direction at the reference viewing time (e.g. "Southwest").
        rise: { type: string, format: date-time, nullable: true }
        set: { type: string, format: date-time, nullable: true }
        constellation:
          type: string
          nullable: true
          description: Constellation the planet is currently in.
        # API-computed fields (Task 2b)
        magnitude:
          type: number
          nullable: true
          description: Visual magnitude (lower = brighter; negative values are very bright).
        transitTime:
          type: string
          format: date-time
          nullable: true
          description: UTC time when planet crosses the meridian (highest altitude).
        rightAscension:
          type: number
          nullable: true
          description: Right Ascension in degrees (0-360).
        declination:
          type: number
          nullable: true
          description: Declination in degrees (-90 to +90).
        elongation:
          type: number
          nullable: true
          description: Angular distance from the Sun in degrees.
        # API-enriched fields (Task 3 — planet viewing quality)
        viewingQuality:
          type: string
          nullable: true
          enum: [excellent, good, fair, poor, not_visible]
          description: Computed per-planet viewing quality based on seeing forecast, altitude, and atmospheric conditions.
        viewingScore:
          type: number
          nullable: true
          minimum: 0
          maximum: 1
          description: Composite viewing quality score (0-1). Seeing 80%, altitude 15%, transparency 5%.
        bestViewingTime:
          type: string
          format: date-time
          nullable: true
          description: Best time to observe this planet tonight (typically transit or nearest clear period).
        clearWindowStart:
          type: string
          format: date-time
          nullable: true
          description: Start of the clear viewing window (altitude > 0° AND cloudcover ≤ 6/9).
        clearWindowEnd:
          type: string
          format: date-time
          nullable: true
          description: End of the clear viewing window.
        conjunction:
          type: string
          nullable: true
          description: Conjunction label when planet is within 5° of Moon (e.g., "Close Conjunction with Moon Tonight").
        viewingNote:
          type: string
          nullable: true
          description: Explanatory note (e.g., "In Sun's Glare" for Mercury, "Bright moon nearby" for faint planets).
      required: [name]

    PlanetVisibility:
      type: object
      properties:
        evening:
          type: array
          description: Planets visible in the evening sky.
          items: { $ref: '#/components/schemas/PlanetEntry' }
        morning:
          type: array
          description: Planets visible in the morning sky.
          items: { $ref: '#/components/schemas/PlanetEntry' }
        allNight:
          type: array
          description: Planets visible throughout the night.
          items: { $ref: '#/components/schemas/PlanetEntry' }
      required: [evening, morning, allNight]

    EclipseContactPoint:
      type: object
      description: One eclipse contact time with the Sun/Moon altitude at that moment.
      properties:
        date:
          type: string
          description: ISO-8601 UTC datetime of the contact event.
        altitude:
          type: number
          description: Altitude of the Sun or Moon above the horizon at that moment (degrees).
      required: [date, altitude]

    LunarEclipseEntry:
      type: object
      description: One lunar eclipse (penumbral, partial, or total) with optional enrichment from AstronomyAPI.com.
      properties:
        date: { type: string, format: date }
        type:
          type: string
          enum: [penumbral, partial, total]
        contactTimes:
          type: object
          nullable: true
          description: |
            Contact-time events for the eclipse. Each key maps to an
            EclipseContactPoint or null when that phase does not occur
            (e.g. penumbral-only eclipses have null partialStart/fullStart etc.).
          properties:
            penumbralStart:
              oneOf:
                - { $ref: '#/components/schemas/EclipseContactPoint' }
                - { type: 'null' }
            partialStart:
              oneOf:
                - { $ref: '#/components/schemas/EclipseContactPoint' }
                - { type: 'null' }
            fullStart:
              oneOf:
                - { $ref: '#/components/schemas/EclipseContactPoint' }
                - { type: 'null' }
            peak:
              oneOf:
                - { $ref: '#/components/schemas/EclipseContactPoint' }
                - { type: 'null' }
            fullEnd:
              oneOf:
                - { $ref: '#/components/schemas/EclipseContactPoint' }
                - { type: 'null' }
            partialEnd:
              oneOf:
                - { $ref: '#/components/schemas/EclipseContactPoint' }
                - { type: 'null' }
            penumbralEnd:
              oneOf:
                - { $ref: '#/components/schemas/EclipseContactPoint' }
                - { type: 'null' }
        obscuration:
          type: number
          nullable: true
          description: Fraction of the Moon's disk obscured at peak (0.0–1.0).
        visibility:
          type: string
          nullable: true
          enum: ["Visible All Night", "Mostly Visible", "Low in Sky", "Barely Visible", "Not Visible"]
          description: Visibility classification at the observer's station location.
      required: [date, type]

    LunarEclipseList:
      type: object
      description: List of lunar eclipses for a date window.
      properties:
        fromDate:
          type: string
          format: date
          description: Start of the search window (YYYY-MM-DD).
        toDate:
          type: string
          format: date
          description: End of the search window (YYYY-MM-DD).
        eclipses:
          type: array
          items: { $ref: '#/components/schemas/LunarEclipseEntry' }
      required: [fromDate, toDate, eclipses]

    SolarEclipseEntry:
      type: object
      description: One solar eclipse (total, annular, or partial) with optional enrichment from AstronomyAPI.com.
      properties:
        date: { type: string, format: date }
        type:
          type: string
          enum: [total, annular, partial]
        contactTimes:
          type: object
          nullable: true
          description: |
            Contact-time events for the eclipse. Each key maps to an
            EclipseContactPoint or null when that phase does not occur
            (e.g. partial eclipses have null totalStart/totalEnd).
          properties:
            partialStart:
              oneOf:
                - { $ref: '#/components/schemas/EclipseContactPoint' }
                - { type: 'null' }
            totalStart:
              oneOf:
                - { $ref: '#/components/schemas/EclipseContactPoint' }
                - { type: 'null' }
            peak:
              oneOf:
                - { $ref: '#/components/schemas/EclipseContactPoint' }
                - { type: 'null' }
            totalEnd:
              oneOf:
                - { $ref: '#/components/schemas/EclipseContactPoint' }
                - { type: 'null' }
            partialEnd:
              oneOf:
                - { $ref: '#/components/schemas/EclipseContactPoint' }
                - { type: 'null' }
        obscuration:
          type: number
          nullable: true
          description: Fraction of the Sun's disk obscured at peak (0.0–1.0).
        visibility:
          type: string
          nullable: true
          enum: ["Fully Visible", "Mostly Visible", "Partially Visible", "Barely Visible", "Not Visible"]
          description: Visibility classification at the observer's station location.
      required: [date, type]

    SolarEclipseList:
      type: object
      description: List of solar eclipses for a date window.
      properties:
        fromDate:
          type: string
          format: date
          description: Start of the search window (YYYY-MM-DD).
        toDate:
          type: string
          format: date
          description: End of the search window (YYYY-MM-DD).
        eclipses:
          type: array
          items: { $ref: '#/components/schemas/SolarEclipseEntry' }
      required: [fromDate, toDate, eclipses]

    MeteorShowerEntry:
      type: object
      properties:
        name: { type: string, description: "Common shower name (e.g. Perseids, Leonids)." }
        peakDate: { type: string, format: date }
        zhr:
          type: integer
          nullable: true
          description: Zenithal hourly rate (peak rate under ideal conditions).
        radiantAltitudeDeg:
          type: number
          nullable: true
          description: Altitude of the shower's radiant point at peak (degrees above horizon, station-local).
        moonIlluminationPercent:
          type: number
          nullable: true
          minimum: 0
          maximum: 100
          description: Moon illumination percentage at peak.
        moonPhase:
          type: string
          nullable: true
          description: Moon phase name at peak (e.g. "waxing-gibbous").
        viewingConditions:
          type: string
          nullable: true
          enum: [excellent, good, fair, poor, null]
          description: Computed viewing-conditions classification based on ZHR and moon interference.
        viewingQuality:
          type: string
          nullable: true
          enum: ["Excellent", "Good", "Fair", "Poor", "Not Visible"]
          description: Human-readable viewing quality label.
        parentBody:
          type: string
          nullable: true
          description: Parent comet or asteroid (e.g. "109P/Swift-Tuttle").
        activeStart:
          type: string
          nullable: true
          description: ISO date when the shower activity begins (approximately peakDate minus half the active duration).
        activeEnd:
          type: string
          nullable: true
          description: ISO date when the shower activity ends (approximately peakDate plus half the active duration).
        description:
          type: string
          nullable: true
          description: Human-readable description of the shower from the catalog.
        velocityKms:
          type: number
          nullable: true
          description: Meteoroid entry velocity in km/s.
        image:
          type: string
          nullable: true
          description: Catalog image filename for the shower (used by dashboard for imagery display).
      required: [name, peakDate]

    # ---------- Seeing forecast ----------

    SeeingForecastPointResponse:
      type: object
      description: One 3-hour forecast step from the 7Timer ASTRO product.
      properties:
        validTime: { type: string, format: date-time }
        seeingIndex: { type: integer, minimum: 1, maximum: 8 }
        transparencyIndex: { type: integer, minimum: 1, maximum: 8 }
        cloudCoverOctet: { type: integer, minimum: 1, maximum: 9 }
        liftedIndex: { type: integer }
        windSpeedClass: { type: integer, minimum: 1, maximum: 8 }
        windDirection:
          type: string
          enum: [N, NE, E, SE, S, SW, W, NW]
        temp2mC: { type: integer }
        humidityClass: { type: integer }
        precType:
          type: string
          enum: [none, rain, snow, frzr, icep]
      required: [validTime, seeingIndex, transparencyIndex, cloudCoverOctet, liftedIndex, windSpeedClass, windDirection, temp2mC, humidityClass, precType]

    SeeingForecastData:
      type: object
      properties:
        initTime:
          type: string
          format: date-time
          description: "7Timer model initialization time"
        points:
          type: array
          items: { $ref: '#/components/schemas/SeeingForecastPointResponse' }
      required: [initTime, points]

    SeeingForecastResponse:
      type: object
      properties:
        data: { $ref: '#/components/schemas/SeeingForecastData' }
        generatedAt: { type: string, format: date-time }
      required: [data, generatedAt]

    # ---------- Climatology ----------

    ClimatologyMonthly:
      type: object
      description: |
        Monthly climatology averages derived from the weewx archive.
        Arrays are always 12-element when present (index 0 = January).
        A field array is omitted entirely when the corresponding column
        is absent from the capability registry — no partial arrays.
      properties:
        months:
          type: array
          description: Month label array — always ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"].
          items: { type: string }
          minItems: 12
          maxItems: 12
        avgHighTemp:
          type: array
          description: Average high temperature per month. Omitted when outTemp unavailable.
          items: { type: number, nullable: true }
          minItems: 12
          maxItems: 12
        avgLowTemp:
          type: array
          description: Average low temperature per month. Omitted when outTemp unavailable.
          items: { type: number, nullable: true }
          minItems: 12
          maxItems: 12
        avgDewpoint:
          type: array
          description: Average dewpoint per month. Omitted when dewpoint unavailable.
          items: { type: number, nullable: true }
          minItems: 12
          maxItems: 12
        avgRainfall:
          type: array
          description: Average total rainfall per month. Omitted when rain unavailable.
          items: { type: number, nullable: true }
          minItems: 12
          maxItems: 12
      required: [months]

    # ---------- Earthquake config / faults ----------

    EarthquakeConfig:
      type: object
      properties:
        provider:
          type: string
          description: Active earthquake provider id (e.g. "usgs", "geonet", "emsc", "renass").
        radiusKm:
          type: number
          description: Search radius in kilometers from station lat/lon.
        minMagnitude:
          type: number
          description: Minimum magnitude threshold for the default query.
        defaultDays:
          type: integer
          description: Default query window in days (from now backward).
      required: [provider, radiusKm, minMagnitude, defaultDays]

    # ---------- Branding ----------

    BrandingConfig:
      type: object
      description: |
        Operator-configured branding metadata. All fields are optional
        and omitted from the response when not configured.
      properties:
        siteTitle:
          type: string
          nullable: true
          description: Operator's site title (overrides the default dashboard title).
        logo:
          type: object
          nullable: true
          description: Logo URLs for light and dark display modes, plus WCAG alt text.
          properties:
            light:
              type: string
              format: uri
              nullable: true
              description: Logo URL for use on light-mode backgrounds.
            dark:
              type: string
              format: uri
              nullable: true
              description: Logo URL for use on dark-mode backgrounds.
            alt:
              type: string
              description: >
                Alt text for the logo image (WCAG 2.1 AA, ADR-022 §5.5).
                Always non-empty when a logo is configured: if the operator has
                not set explicit alt text the API falls back to
                "<site_title> logo" or "Weather station logo".
        faviconUrl:
          type: string
          format: uri
          nullable: true
          description: Favicon URL.
        social:
          type: object
          nullable: true
          description: Social media profile URLs. Each field is omitted when not configured.
          properties:
            facebook:  { type: string, format: uri, nullable: true }
            twitter:   { type: string, format: uri, nullable: true }
            instagram: { type: string, format: uri, nullable: true }
            youtube:   { type: string, format: uri, nullable: true }

    # ---------- Records ----------

    RecordEntry:
      type: object
      description: One named record (e.g. "All-time high outTemp").
      properties:
        label: { type: string }
        canonicalField: { type: string, description: "Canonical field name this record measures." }
        value: { type: number, nullable: true }
        observedAt: { type: string, format: date-time, nullable: true }
        brokenInLast30Days: { type: boolean, default: false }
      required: [label, canonicalField]

    RecordsBundle:
      type: object
      description: Records grouped by section per ADR-024.
      properties:
        period: { type: string, description: "ytd | all-time | YYYY" }
        sections:
          type: object
          description: Section name → list of record entries.
          additionalProperties:
            type: array
            items: { $ref: '#/components/schemas/RecordEntry' }
      required: [period, sections]

    # ---------- Reports (NOAA) ----------

    ReportEntry:
      type: object
      description: |
        One NOAA report file weewx has generated. weewx writes both
        monthly summaries (`NOAA-YYYY-MM.txt` via `[[SummaryByMonth]]`)
        and yearly summaries (`NOAA-YYYY.txt` via `[[SummaryByYear]]`).
        `kind` distinguishes the two; `month` is absent for `yearly`.
      properties:
        kind:
          type: string
          enum: [monthly, yearly]
        year: { type: integer }
        month:
          type: integer
          minimum: 1
          maximum: 12
          nullable: true
          description: 1..12 for `monthly`; absent / null for `yearly`.
        filename: { type: string }
        modifiedAt: { type: string, format: date-time }
      required: [kind, year, filename, modifiedAt]

    ReportIndex:
      type: object
      properties:
        reports:
          type: array
          items: { $ref: '#/components/schemas/ReportEntry' }
      required: [reports]

    NOAAReport:
      type: object
      description: |
        Raw text contents of one weewx-generated `NOAA-YYYY-MM.txt`
        monthly summary. Dashboard parses the fixed-width text for
        table view; preserves raw text for the "Download .txt" link.
      properties:
        year: { type: integer }
        month: { type: integer, minimum: 1, maximum: 12 }
        filename: { type: string }
        rawText: { type: string }
        modifiedAt: { type: string, format: date-time }
      required: [year, month, filename, rawText]

    NOAAYearlyReport:
      type: object
      description: |
        Raw text contents of one weewx-generated `NOAA-YYYY.txt`
        yearly summary. Same generator as `NOAAReport` but spans the
        whole year and has no `month` field.
      properties:
        year: { type: integer }
        filename: { type: string }
        rawText: { type: string }
        modifiedAt: { type: string, format: date-time }
      required: [year, filename, rawText, modifiedAt]

    # ---------- Pages / charts / capabilities / content ----------

    PageMetadata:
      type: object
      properties:
        slug: { type: string, description: "URL slug, e.g. 'now', 'forecast'." }
        name: { type: string }
        icon: { type: string, description: "Lucide icon name." }
        navPosition: { type: integer }
        builtIn: { type: boolean }
        hidden: { type: boolean, default: false }
      required: [slug, name, icon, navPosition, builtIn]

    PageList:
      type: object
      properties:
        pages:
          type: array
          items: { $ref: '#/components/schemas/PageMetadata' }
      required: [pages]

    ChartGroup:
      type: object
      properties:
        id: { type: string, description: "e.g. 'homepage', 'monthly', 'ANNUAL', or operator-custom slug." }
        name: { type: string }
        builtIn: { type: boolean }
        members:
          type: array
          description: Canonical field names plotted in this group.
          items: { type: string }
        defaultRange:
          type: string
          nullable: true
          description: e.g. "1d", "30d", or null when group has its own selector model.
      required: [id, name, builtIn, members]

    ChartGroupList:
      type: object
      properties:
        groups:
          type: array
          items: { $ref: '#/components/schemas/ChartGroup' }
      required: [groups]

    CapabilityDeclaration:
      type: object
      description: Per ADR-038 rule 4. One per configured-and-enabled provider module.
      properties:
        providerId: { type: string }
        domain:
          type: string
          enum: [forecast, alerts, aqi, earthquakes, radar]
        suppliedCanonicalFields:
          type: array
          items: { type: string }
        geographicCoverage:
          type: string
          description: '"global" or operator-meaningful region descriptor.'
        defaultPollIntervalSeconds: { type: integer, minimum: 0 }
        operatorNotes: { type: string, nullable: true }
        tileUrlTemplate:
          type: string
          nullable: true
          description: 'XYZ slippy tile URL template ({z}/{x}/{y} placeholders). Radar XYZ providers only.'
        wmsEndpointUrl:
          type: string
          nullable: true
          description: 'WMS GetMap base URL. Radar WMS-T providers only.'
        wmsLayerName:
          type: string
          nullable: true
          description: 'WMS layer name. Radar WMS-T providers only.'
        tileContentType:
          type: string
          nullable: true
          description: 'MIME type for tile content (e.g. image/png). All radar providers.'
        iframeUrl:
          type: string
          nullable: true
          description: 'Operator-supplied iframe URL. iframe radar provider only.'
      required: [providerId, domain, suppliedCanonicalFields, geographicCoverage]

    CapabilityRegistry:
      type: object
      properties:
        providers:
          type: array
          items: { $ref: '#/components/schemas/CapabilityDeclaration' }
        weewxColumns:
          type: array
          description: |
            Canonical fields supplied by the weewx archive (auto-mapped
            stock columns + operator-mapped custom columns per ADR-035).
          items:
            type: object
            properties:
              canonicalField: { type: string }
              archiveColumn: { type: string }
            required: [canonicalField, archiveColumn]
        canonicalFieldsAvailable:
          type: array
          description: Union of fields supplied by any configured source.
          items: { type: string }
      required: [providers, weewxColumns, canonicalFieldsAvailable]

    MarkdownContent:
      type: object
      properties:
        markdown: { type: string }
        updatedAt: { type: string, format: date-time, nullable: true }
      required: [markdown]

    # ---------- Radar ----------

    RadarFrame:
      type: object
      properties:
        time: { type: string, format: date-time }
        kind:
          type: string
          enum: [past, current, nowcast]
        path:
          type: string
          nullable: true
          description: |
            Per-frame tile path (set by RainViewer; null for WMS-T providers).
            Dashboard combines this with the response-level `tileHost` plus
            the provider's CAPABILITY.tile_url_template (`{host}{path}/...`)
            to construct the per-frame tile URL. WMS-T providers compose
            tile URLs via the `?TIME=<frame.time>` query parameter on
            CAPABILITY.wms_endpoint_url instead and leave this null.
            Added 3b-14 auditor F2.
      required: [time, kind]

    RadarFrameList:
      type: object
      properties:
        providerId: { type: string }
        frames:
          type: array
          items: { $ref: '#/components/schemas/RadarFrame' }
        attribution: { type: string, nullable: true }
        tileHost:
          type: string
          nullable: true
          description: |
            Per-fetch tile-server host (set by RainViewer from its JSON
            envelope's `host` field; null for WMS-T providers, which carry
            their endpoint URL on CAPABILITY.wms_endpoint_url instead).
            The dashboard substitutes this into CAPABILITY.tile_url_template's
            `{host}` placeholder. Added 3b-14 auditor F2.
      required: [providerId, frames]

    # ---------- Health ----------

    HealthCheck:
      type: object
      properties:
        status:
          type: string
          enum: [ok, warning, error]
        messages:
          type: array
          items: { type: string }
      required: [status]

    HealthStatus:
      type: object
      properties:
        status:
          type: string
          enum: [ok, degraded, unhealthy]
        checks:
          type: object
          additionalProperties: { $ref: '#/components/schemas/HealthCheck' }
      required: [status, checks]

    # -----------------------------------------------------------------
    # Response envelopes (one per data-bearing endpoint)
    # -----------------------------------------------------------------

    ObservationResponse:
      type: object
      properties:
        data:
          oneOf:
            - { $ref: '#/components/schemas/Observation' }
            - { type: 'null' }
        units: { $ref: '#/components/schemas/UnitsBlock' }
        source: { type: string }
        generatedAt: { type: string, format: date-time }
      required: [data, units, source, generatedAt]

    ArchiveResponse:
      type: object
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/ArchiveRecord' }
        units: { $ref: '#/components/schemas/UnitsBlock' }
        source: { type: string }
        generatedAt: { type: string, format: date-time }
        page: { $ref: '#/components/schemas/PageInfo' }
      required: [data, units, source, generatedAt, page]

    RecordsResponse:
      type: object
      properties:
        data: { $ref: '#/components/schemas/RecordsBundle' }
        units: { $ref: '#/components/schemas/UnitsBlock' }
        source: { type: string }
        generatedAt: { type: string, format: date-time }
      required: [data, units, source, generatedAt]

    ForecastResponse:
      type: object
      properties:
        data: { $ref: '#/components/schemas/ForecastBundle' }
        units: { $ref: '#/components/schemas/UnitsBlock' }
        source: { type: string }
        generatedAt: { type: string, format: date-time }
      required: [data, units, source, generatedAt]

    AlertListResponse:
      type: object
      properties:
        data: { $ref: '#/components/schemas/AlertList' }
        source: { type: string }
        generatedAt: { type: string, format: date-time }
      required: [data, source, generatedAt]

    AQIResponse:
      type: object
      properties:
        data:
          oneOf:
            - { $ref: '#/components/schemas/AQIReading' }
            - { type: 'null' }
        units: { $ref: '#/components/schemas/UnitsBlock' }
        source: { type: string }
        generatedAt: { type: string, format: date-time }
      required: [data, units, source, generatedAt]

    AQIHistoryResponse:
      type: object
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/AQIReading' }
        units: { $ref: '#/components/schemas/UnitsBlock' }
        source: { type: string }
        generatedAt: { type: string, format: date-time }
        page: { $ref: '#/components/schemas/PageInfo' }
      required: [data, units, source, generatedAt, page]

    EarthquakeListResponse:
      type: object
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/EarthquakeRecord' }
        source: { type: string }
        generatedAt: { type: string, format: date-time }
      required: [data, source, generatedAt]

    AlmanacResponse:
      type: object
      properties:
        data: { $ref: '#/components/schemas/AlmanacSnapshot' }
        generatedAt: { type: string, format: date-time }
      required: [data, generatedAt]

    SunTimesResponse:
      type: object
      properties:
        data: { $ref: '#/components/schemas/SunTimesSeries' }
        generatedAt: { type: string, format: date-time }
      required: [data, generatedAt]

    MoonPhaseResponse:
      type: object
      properties:
        data: { $ref: '#/components/schemas/MoonPhaseCalendar' }
        generatedAt: { type: string, format: date-time }
      required: [data, generatedAt]

    StationResponse:
      type: object
      properties:
        data: { $ref: '#/components/schemas/StationMetadata' }
        units: { $ref: '#/components/schemas/UnitsBlock' }
        generatedAt: { type: string, format: date-time }
      required: [data, units, generatedAt]

    CapabilityResponse:
      type: object
      properties:
        data: { $ref: '#/components/schemas/CapabilityRegistry' }
        generatedAt: { type: string, format: date-time }
      required: [data, generatedAt]

    PageListResponse:
      type: object
      properties:
        data: { $ref: '#/components/schemas/PageList' }
        generatedAt: { type: string, format: date-time }
      required: [data, generatedAt]

    ChartGroupResponse:
      type: object
      properties:
        data: { $ref: '#/components/schemas/ChartGroupList' }
        generatedAt: { type: string, format: date-time }
      required: [data, generatedAt]

    ReportIndexResponse:
      type: object
      properties:
        data: { $ref: '#/components/schemas/ReportIndex' }
        generatedAt: { type: string, format: date-time }
      required: [data, generatedAt]

    ReportResponse:
      type: object
      properties:
        data: { $ref: '#/components/schemas/NOAAReport' }
        generatedAt: { type: string, format: date-time }
      required: [data, generatedAt]

    YearlyReportResponse:
      type: object
      properties:
        data: { $ref: '#/components/schemas/NOAAYearlyReport' }
        generatedAt: { type: string, format: date-time }
      required: [data, generatedAt]

    MarkdownResponse:
      type: object
      properties:
        data: { $ref: '#/components/schemas/MarkdownContent' }
        generatedAt: { type: string, format: date-time }
      required: [data, generatedAt]

    RadarFramesResponse:
      type: object
      properties:
        data: { $ref: '#/components/schemas/RadarFrameList' }
        generatedAt: { type: string, format: date-time }
      required: [data, generatedAt]

    AlmanacPlanetsResponse:
      type: object
      properties:
        data: { $ref: '#/components/schemas/PlanetVisibility' }
        generatedAt: { type: string, format: date-time }
      required: [data, generatedAt]

    AlmanacMoonNamesResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            fullMoons:
              type: array
              items: { $ref: '#/components/schemas/FullMoonEntry' }
          required: [fullMoons]
        generatedAt: { type: string, format: date-time }
      required: [data, generatedAt]

    AlmanacEclipsesResponse:
      type: object
      description: Envelope for GET /almanac/eclipses and GET /almanac/eclipses/lunar.
      properties:
        data: { $ref: '#/components/schemas/LunarEclipseList' }
        generatedAt: { type: string, format: date-time }
      required: [data, generatedAt]

    SolarEclipseResponse:
      type: object
      description: Envelope for GET /almanac/eclipses/solar.
      properties:
        data: { $ref: '#/components/schemas/SolarEclipseList' }
        generatedAt: { type: string, format: date-time }
      required: [data, generatedAt]

    AlmanacMeteorShowersResponse:
      type: object
      description: Envelope for GET /almanac/meteor-showers.
      properties:
        data:
          type: object
          description: Meteor shower list with date window.
          properties:
            fromDate:
              type: string
              format: date
              description: Start of the search window (YYYY-MM-DD).
            toDate:
              type: string
              format: date
              description: End of the search window (YYYY-MM-DD).
            showers:
              type: array
              items: { $ref: '#/components/schemas/MeteorShowerEntry' }
          required: [fromDate, toDate, showers]
        generatedAt: { type: string, format: date-time }
      required: [data, generatedAt]

    SunPosition:
      type: object
      required: [azimuth, altitude]
      properties:
        azimuth:
          type: number
          format: float
          description: Sun azimuth in degrees (0-360)
        altitude:
          type: number
          format: float
          description: Sun altitude in degrees above horizon

    MoonPosition:
      type: object
      required: [azimuth, altitude, illuminationPercent, phaseName]
      properties:
        azimuth:
          type: number
          format: float
          description: Moon azimuth in degrees (0-360)
        altitude:
          type: number
          format: float
          description: Moon altitude in degrees above horizon
        illuminationPercent:
          type: number
          format: float
          description: Moon illumination percentage (0-100)
        phaseName:
          type: string
          description: Moon phase name
          enum: [new, waxing-crescent, first-quarter, waxing-gibbous, full, waning-gibbous, last-quarter, waning-crescent]

    PositionsSnapshot:
      type: object
      required: [sun, moon]
      properties:
        sun:
          $ref: '#/components/schemas/SunPosition'
        moon:
          $ref: '#/components/schemas/MoonPosition'

    PositionsResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/PositionsSnapshot'

    ClimatologyMonthlyResponse:
      type: object
      properties:
        data: { $ref: '#/components/schemas/ClimatologyMonthly' }
        source:
          type: string
          description: Always `"weewx"` for archive-derived climatology.
        generatedAt: { type: string, format: date-time }
      required: [data, source, generatedAt]

    EarthquakeConfigResponse:
      type: object
      properties:
        data: { $ref: '#/components/schemas/EarthquakeConfig' }
        generatedAt: { type: string, format: date-time }
      required: [data, generatedAt]

    EarthquakeFaultsResponse:
      type: object
      properties:
        data:
          type: object
          description: GeoJSON FeatureCollection of active fault lines.
          properties:
            type:
              type: string
              enum: [FeatureCollection]
            features:
              type: array
              description: GeoJSON Feature array. Feature geometry and properties are provider-defined.
              items:
                type: object
          required: [type, features]
        attribution:
          type: string
          description: Required attribution string for the fault data source.
          example: "Active faults: GEM Global Active Faults Database, CC-BY-SA 4.0"
        generatedAt: { type: string, format: date-time }
      required: [data, attribution, generatedAt]

    BrandingResponse:
      type: object
      properties:
        data: { $ref: '#/components/schemas/BrandingConfig' }
        generatedAt: { type: string, format: date-time }
      required: [data, generatedAt]

    # ---------- Charts config ----------

    SeriesConfigResponse:
      type: object
      description: One data series configuration within a chart.
      properties:
        seriesId: { type: string }
        observationType: { type: string, nullable: true }
        name: { type: string, nullable: true }
        color: { type: string, nullable: true }
        type: { type: string, nullable: true }
        zIndex: { type: integer, nullable: true }
        yAxis: { type: integer, nullable: true }
        yAxisMin: { type: number, nullable: true }
        yAxisMax: { type: number, nullable: true }
        yAxisLabel: { type: string, nullable: true }
        yAxisTickInterval: { type: number, nullable: true }
        lineWidth: { type: integer, nullable: true }
        connectNulls: { type: boolean, nullable: true }
        visible: { type: boolean, nullable: true }
        opacity: { type: number, nullable: true }
        stacking: { type: string, nullable: true }
        aggregateType: { type: string, nullable: true }
        averageType: { type: string, nullable: true }
        markerEnabled: { type: boolean, nullable: true }
        markerRadius: { type: integer, nullable: true }
        beaufortColors:
          type: object
          description: Map of Beaufort scale integer (as string key) to hex color string.
          additionalProperties: { type: string }
        rangeType: { type: string, nullable: true }
        areaDisplay: { type: integer, nullable: true }
        useCustomSql: { type: boolean }
        customSqlQuery: { type: string, nullable: true }
        xColumn: { type: string, nullable: true }
        yColumn: { type: string, nullable: true }
        yAxisSoftMin: { type: number, nullable: true }
        yAxisSoftMax: { type: number, nullable: true }
        borderWidth: { type: integer, nullable: true }
        numberFormat:
          type: object
          nullable: true
          description: Number formatting options (decimals, decimalPoint, thousandsSep).
          properties:
            decimals: { type: integer, nullable: true }
            decimalPoint: { type: string, nullable: true }
            thousandsSep: { type: string, nullable: true }
      required: [seriesId, useCustomSql]

    ChartConfigResponse:
      type: object
      description: One chart configuration within a group.
      properties:
        chartId: { type: string }
        title: { type: string, nullable: true }
        type: { type: string, nullable: true }
        connectNulls: { type: boolean, nullable: true }
        yAxisMin: { type: number, nullable: true }
        aggregateType: { type: string, nullable: true }
        aggregateInterval: { type: integer, nullable: true }
        xAxisGroupby: { type: string, nullable: true }
        xAxisCategories:
          type: array
          items: { type: string }
        forceFullYear: { type: boolean, nullable: true }
        series:
          type: array
          items: { $ref: '#/components/schemas/SeriesConfigResponse' }
      required: [chartId]

    ChartGroupConfigResponse:
      type: object
      description: One chart group (tab) configuration.
      properties:
        groupId: { type: string }
        title: { type: string, nullable: true }
        showButton: { type: boolean }
        buttonText: { type: string, nullable: true }
        type: { type: string, nullable: true }
        enableDateRanges: { type: boolean }
        rollingRanges:
          type: array
          items: { type: string }
        availableYears:
          type: array
          items: { type: integer }
        enableMonthlyBreakdown: { type: boolean }
        timeLength:
          oneOf:
            - { type: integer }
            - { type: string }
            - { type: 'null' }
          description: Time window length (integer seconds or string shorthand, e.g. "1y").
        timespanStart: { type: integer, nullable: true }
        timespanStop: { type: integer, nullable: true }
        tooltipDateFormat: { type: string, nullable: true }
        gapsize: { type: integer, nullable: true }
        aggregateInterval: { type: integer, nullable: true }
        aggregateType: { type: string, nullable: true }
        forceFullYear: { type: boolean }
        startAtBeginningOfMonth: { type: boolean }
        pageContent: { type: string, nullable: true }
        generate: { type: string, nullable: true }
        charts:
          type: array
          items: { $ref: '#/components/schemas/ChartConfigResponse' }
      required: [groupId, showButton, enableDateRanges, enableMonthlyBreakdown, forceFullYear, startAtBeginningOfMonth]

    ChartsConfigData:
      type: object
      description: Full charts configuration tree (global defaults + all groups).
      properties:
        aggregateType: { type: string, nullable: true }
        timeLength:
          oneOf:
            - { type: integer }
            - { type: string }
            - { type: 'null' }
          description: Global default time window length.
        type:
          type: string
          description: Default chart type (e.g. "line").
        colors:
          type: array
          items: { type: string }
          description: Global default color palette (hex strings).
        tooltipDateFormat: { type: string, nullable: true }
        groups:
          type: array
          items: { $ref: '#/components/schemas/ChartGroupConfigResponse' }
      required: [type]

    ChartsConfigResponse:
      type: object
      description: Envelope for GET /charts/config.
      properties:
        data: { $ref: '#/components/schemas/ChartsConfigData' }
        generatedAt: { type: string, format: date-time }
      required: [data, generatedAt]

    CustomQueryPoint:
      type: object
      description: One (x, y) data point from a custom SQL query.
      properties:
        x:
          oneOf:
            - { type: number }
            - { type: string }
            - { type: 'null' }
        y:
          oneOf:
            - { type: number }
            - { type: string }
            - { type: 'null' }

    CustomQueryResponse:
      type: object
      description: Envelope for GET /charts/custom-query/{series_id}.
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/CustomQueryPoint' }
        seriesId: { type: string }
        source: { type: string, default: weewx }
        generatedAt: { type: string, format: date-time }
      required: [data, seriesId, source, generatedAt]
