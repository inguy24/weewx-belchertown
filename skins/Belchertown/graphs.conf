[averageclimate]
    title = "Average Climate by Month"
    show_button = true
    button_text = "Average Climate"
    type = spline
    time_length = all
    tooltip_date_format = "dddd LL"
    aggregate_interval = 86400 # 1 day
    gapsize = 86400 # 1 day in seconds
    start_at_beginning_of_month = true
#    generate = daily

    [[avgclimatetotal]]
        title = "Average Climatological Values by Month"
        type = spline
        aggregate_interval = 86400 # 1 day
        xAxis_groupby = month
        xAxis_categories = 'Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'
        [[[outTemp]]]
            aggregate_type = avg
            average_type = max
            zIndex = 2
            name = Average High Temperature
            color = red
            [[[[marker]]]]
                enabled = true
                radius = 4
        [[[outTemp_min]]]
            name = Average Low Temperature
            observation_type = outTemp
            aggregate_type = avg
            average_type = min
            zIndex = 2
            [[[[marker]]]]
                enabled = true
                radius = 4
        [[[dewpoint]]]
            name = Average Dewpoint
            aggregate_type = avg
            zIndex = 2
            color = purple
            [[[[marker]]]]
                enabled = true
                radius = 4
        [[[custom_average_rains]]]
            name = Average Monthly Rain Total
            yAxis_label = "Average Monthly Rain Total (in)"
            use_custom_sql = true # This tells Belchertown to use a custom SQL query
            custom_sql_query = "SELECT month, AVG(rain_total) AS avg_monthly_climo_rain FROM archive_month_raintotal GROUP BY month ORDER BY month ASC"
            x_column = month # The column from your SQL query for the X-axis (1-12)
            y_column = avg_monthly_climo_rain # The column from your SQL query for the Y-axis (the average total rain)
            type = column # Display as a bar chart, similar to how your original rainl was
            yAxis = 1 # Use the secondary Y-axis, typically for rain
            zIndex = 0
            color = "#268bd2" # Use your preferred color for rain bars


[homepage]
    # Chart Timespan Defaults
    title = "Last 24 Hours/Week/Month"
    show_button = true
    button_text = "Last 24 Hours/Week/Month"
    enable_date_ranges = true
    rolling_ranges = 1d, 3d, 7d, 30d, 90d
    time_length = 86400
    tooltip_date_format = "LLL"
    gapsize = 300 # This should be your archive_interval from weewx.conf
    aggregate_interval = 500

    [[chart1]]
        connectNulls = true
        title = Temperature
        [[[outTemp]]]
            zIndex = 1
            name = Temperature
        [[[windchill]]]
        [[[heatindex]]]
            color = "#f7a35c"
        [[[dewpoint]]]
            color = purple


    [[chart2]]
        # The combined Wind Chart works best in this configuration
        title = Wind Speed and Direction
        yAxis_min = 0
        [[[windDir]]]
            zIndex = 1
            yAxis = 1
            yAxis_max = 360
            lineWidth = 0
            [[[[marker]]]]
                enabled = true
            [[[[states]]]]
                [[[[[hover]]]]]
                        lineWidthPlus = 0
        [[[windGust]]]
            connectNulls = true
        [[[windSpeed]]] 
            connectNulls = true 
            zIndex = 2
    

    [[roseplt]]
        title = Wind Rose
        [[[windRose]]]
            beauford0 = "#1278c8"
            beauford1 = "#1fafdd"
            beauford2 = "#71bc3c"
            beauford3 = "#ffae00"
            beauford4 = "#ff7f00"
            beauford5 = "#ff4500"
            beauford6 = "#9f00c5"

    [[chart3]]
        title = Rain
        connectNulls = true
        type = line
        [[[rainRate]]]
            yAxis = 1
            visible = true
            color = "#28a745" 
            opacity = 1
            aggregate_type = max
        [[[rainTotal]]]
            name = Rain Total
            visible = true
            color = "#007bff" 
            opacity = 1
            aggregate_type = sum

    [[chart4]]
        title = Barometer
        type = spline
        connectNulls = true
        [[[barometer]]]
            color = "#BECC00"
            yAxis_tickinterval = 0.01

    [[solarRadGraph]]
        title = Solar Radiation and  UV Index
        connectNulls = true
        [[[radiation]]]
           name = Solar Radiation
           zIndex = 1
           color = "#ffc83f"
        [[[maxSolarRad]]]
            name = Theoretical Max Solar Radiation
            type = area
            color = "#f7f2b4"
            yAxis_label = "W/m2"
        [[[UV]]]
            yAxis = 1
            yAxis_min = 0
            yAxis_max = 14
            color = "#90ed7d"
            yAxis_label = "UV"
            name = UV Index
            zIndex = 2

    [[homeLightningInfo]]
        title = Lightning
        [[[lightning_strike_count]]]
            yAxis = 0
            yAxis_min = 1
            yAxis_tickInterval = 1
            yAxis_label = "Number of Strikes"
            stacking = normal
            color = "orange"
            lineWidth = 0
            aggregate_type = sum

            [[[[marker]]]]
                enabled = true
                radius = 4
            [[[[states]]]]
                [[[[[hover]]]]]
                        lineWidthPlus = 0
        [[[lightning_distance]]]
            yAxis = 1
            yAxis_min = 0
            yAxis_label = "Distance (miles)"
            stacking = normal
            color = "blue"
            lineWidth = 0
            aggregate_type = avg

            [[[[marker]]]]
                enabled = true
                radius = 3
            [[[[states]]]]
                [[[[[hover]]]]]
                        lineWidthPlus = 0


